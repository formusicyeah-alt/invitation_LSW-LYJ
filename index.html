<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>이승원,이유진 결혼합니다.</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 1; }
        #portrait-warning { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #ffffff; color: #000000; display: none; justify-content: center; align-items: center; z-index: 9999; text-align: center; font-family: "Arial", sans-serif; }
        @media screen and (orientation: portrait) { #portrait-warning { display: flex; } }
        
        /* 💡 캔버스 자체의 스타일링을 통해 브라우저 확대 시 화질 저하 추가 방지 */
        canvas {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* 💡 2. 마우스 커서 이미지 전역 설정 (Phaser의 기본 pointer 설정보다 강제로 우선 적용) */
        * {
            cursor: url('images/click_0.png'), auto !important;
        }
    </style>
</head>
<body>
<div id="portrait-warning"><h1>📱<br><br>화면을 가로로 돌려주세요!</h1></div>
<div id="game-container"></div>

<script>
    // =========================================================================
    // 📦 공용 헬퍼 함수
    //  - 여러 장의 연속 번호 이미지를 한 번에 불러오거나, 같은 패턴의 애니메이션을
    //    여러 캐릭터/NPC에 반복 생성할 때 쓰는 함수들입니다.
    // =========================================================================

    // 연속된 번호가 붙은 이미지 시퀀스를 한 번에 로드 (예: spinel_0 ~ spinel_11)
    function loadSequence(scene, prefix, start, end) {
        for (let i = start; i <= end; i++) {
            scene.load.image(`${prefix}_${i}`, `images/${prefix}_${i}.png`);
        }
    }

    // 연속된 번호 이미지로 애니메이션 1개를 등록
    function createAnim(scene, key, prefix, frameCount, frameRate = 6, repeat = -1) {
        scene.anims.create({
            key,
            frames: Array.from({ length: frameCount }, (_, i) => ({ key: `${prefix}_${i}` })),
            frameRate,
            repeat
        });
    }


    // =========================================================================
    // 🎬 SCENE 1. StartScene
    //  - 청첩장 인트로 영상(애니메이션)을 보여주고, 클릭하면 캐릭터 선택 화면으로 이동
    // =========================================================================
    class StartScene extends Phaser.Scene {
        constructor() { super({ key: 'StartScene' }); }

        preload() {
            // 인트로 청첩장 애니메이션 (invit_0 ~ invit_20)
            loadSequence(this, 'invit', 0, 20);

            // 캐릭터 선택 화면용 배경/UI 이미지
            this.load.image('bg_select', 'images/bg_select.png');
            this.load.image('sign', 'images/sign.png');
            this.load.image('title_sign', 'images/title_sign.png');
            this.load.image('title', 'images/title.png');
            this.load.image('sound_on', 'images/sound_on.png');
            this.load.image('sound_off', 'images/sound_off.png');

            // BGM (캐릭터 선택 화면 배경음 + 캐릭터 선택 효과음)
            this.load.audio('bgm_select', 'audio/bgm_select.mp3');
            this.load.audio('bgm_ch_select', 'audio/bgm_ch_select.mp3');

            // 웨딩빌리지 배경/배경음
            this.load.image('bg_wedding_village', 'images/bg_wedding_village.png');
            this.load.audio('bgm_wedding_village', 'audio/bgm_wedding_village.mp3');

            // 플레이어 캐릭터(man/woman/toben) 공용 애니메이션 이미지
            //  - stand1: 가만히 서있기(숨쉬기) 4프레임
            //  - walk1 : 걷기 5프레임
            //  - jump  : 점프 2프레임(상승/정점)
            ['man', 'woman', 'toben'].forEach(char => {
                loadSequence(this, `${char}_stand1`, 0, 3);
                loadSequence(this, `${char}_walk1`, 0, 4);
                loadSequence(this, `${char}_jump`, 0, 1);
                this.load.image(`${char}_prone`, `images/${char}_prone.png`); // 아래 점프 시 엎드린 모습 이미지
            });

            // 일반 포탈 / 히든 포탈 / 스포트라이트 이미지
            loadSequence(this, 'portal', 0, 7);
            loadSequence(this, 'hiden_portal', 1, 5); // ※ 0번 없이 1~5번만 로드됨 (원본 그대로 유지, 아래 VillageScene 주석 참고)
            loadSequence(this, 'sprite', 0, 5);

            // 효과음 (포탈 이동음 / 히든포탈 이동음 / 점프음)
            this.load.audio('bgm_portal', 'audio/bgm_portal.mp3');
            this.load.audio('bgm_tel', 'audio/bgm_tel.mp3');
            this.load.audio('bgm_jump', 'audio/bgm_jump.mp3');

            // 방향키 버튼 이미지 (1장으로 4방향 모두 회전시켜 재사용)
            this.load.image('arrow_0', 'images/arrow_0.png');
        }

        create() {
            // 청첩장 인트로 애니메이션 재생 → 클릭하면 전체화면 + 캐릭터 선택 화면으로 페이드 전환
            createAnim(this, 'invit_playing', 'invit', 21, 12);

            this.add.sprite(640, 360, 'invit_0')
                .setScale(2)
                .play('invit_playing')
                .setInteractive()
                .on('pointerup', () => {
                    try { if (!this.scale.isFullscreen) this.scale.startFullscreen(); } catch (e) {}

                    this.cameras.main.fadeOut(1000, 0, 0, 0);
                    this.cameras.main.once('camerafadeoutcomplete', () => {
                        this.scene.start('SelectScene');
                    });
                });
        }
    }


    // =========================================================================
    // 🎬 SCENE 2. SelectScene
    //  - 캐릭터(man/woman/toben) 선택 화면
    //  - 캐릭터 클릭 시 강조 표시 + 효과음, 표지판 클릭 시 웨딩빌리지 입장
    // =========================================================================
    class SelectScene extends Phaser.Scene {
        constructor() { super({ key: 'SelectScene' }); }

        create() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);

            this.selectedChar = '';
            this.isSoundOn = false;

            // --- 배경 / 타이틀 이미지 배치 ---
            this.add.image(640, 360, 'bg_select').setDisplaySize(1280, 720);
            this.add.image(125, 170, 'title_sign').setScale(0.25);
            this.add.image(660, 170, 'title').setScale(0.45);

            // --- 장식용 포탈 애니메이션 + 스포트라이트(선택한 캐릭터 위에 비추는 빛) ---
            createAnim(this, 'portal_playing', 'portal', 8, 5);
            this.add.sprite(300, 500, 'portal_0').setOrigin(0.2, 1).setScale(1.5).play('portal_playing');

            createAnim(this, 'spotlight_playing', 'sprite', 6, 10);
            this.spotlight = this.add.sprite(-200, -200, 'sprite_0').setScale(2).play('spotlight_playing').setVisible(false);

            // --- 사운드 ON/OFF 버튼 + 선택 화면 BGM ---
            let soundBtn = this.add.image(1200, 50, 'sound_off').setInteractive({ useHandCursor: true }).setScale(0.1);

            let bgm = this.cache.audio.exists('bgm_select')
                ? this.sound.add('bgm_select', { loop: true, volume: 0.5 })
                : null;

            soundBtn.on('pointerdown', (pointer, localX, localY, event) => {
                if (event) event.stopPropagation();
                if (!bgm) return;

                if (bgm.isPlaying) {
                    bgm.pause();
                    soundBtn.setTexture('sound_off');
                    this.isSoundOn = false;
                } else {
                    bgm.isPaused ? bgm.resume() : bgm.play();
                    soundBtn.setTexture('sound_on');
                    this.isSoundOn = true;
                }
            });

            // --- 캐릭터 선택 버튼 3종 (man / woman / toben) ---
            // 캐릭터별 "서있기" / "걷기" 애니메이션을 한 번에 등록
            ['man', 'woman', 'toben'].forEach(char => {
                this.anims.create({
                    key: `${char}_breathing`,
                    frames: [0, 0, 1, 1, 2, 2, 3, 3].map(i => ({ key: `${char}_stand1_${i}` })), // 천천히 숨쉬는 느낌을 주기 위해 프레임을 2번씩 반복
                    frameRate: 6,
                    repeat: -1
                });
                createAnim(this, `${char}_walking`, `${char}_walk1`, 5);
            });

            let manBtn = this.add.sprite(500, 510, 'man_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('man_breathing');
            let womanBtn = this.add.sprite(725, 510, 'woman_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('woman_breathing');
            let tobenBtn = this.add.sprite(950, 510, 'toben_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('toben_breathing');

            const charButtons = [manBtn, womanBtn, tobenBtn];

            // 캐릭터 선택 시: 선택된 캐릭터만 밝게(걷기 애니메이션) + 나머지는 반투명(숨쉬기) + 스포트라이트 이동 + 선택 효과음
            const selectCharacter = (targetBtn, charName) => {
                charButtons.forEach(b => {
                    b.setAlpha(0.5).play(`${b.texture.key.split('_')[0]}_breathing`);
                });

                targetBtn.setAlpha(1).play(`${charName}_walking`);
                this.selectedChar = charName;
                this.spotlight.setVisible(true).setPosition(targetBtn.x, targetBtn.y - 250);

                this.sound.stopByKey('bgm_ch_select'); // 효과음 중첩 방지(기존 재생 중인 것 강제 정지)
                this.sound.play('bgm_ch_select');
            };

            manBtn.on('pointerdown', () => selectCharacter(manBtn, 'man'));
            womanBtn.on('pointerdown', () => selectCharacter(womanBtn, 'woman'));
            tobenBtn.on('pointerdown', () => selectCharacter(tobenBtn, 'toben'));

            // --- 표지판(웨딩빌리지 입장) ---
            this.add.image(1150, 305, 'sign').setScale(0.3).setInteractive().on('pointerdown', () => {
                if (!this.selectedChar) return; // 캐릭터를 아직 선택하지 않았으면 무시

                this.sound.play('bgm_portal'); // 입장 포탈 효과음

                this.cameras.main.fadeOut(1000, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    const goToVillage = () => this.scene.start('VillageScene', {
                        character: this.selectedChar,
                        isSoundOn: this.isSoundOn
                    });

                    if (bgm && bgm.isPlaying) {
                        // 선택 화면 BGM을 서서히 줄이면서 다음 씬으로 전환
                        this.tweens.add({
                            targets: bgm,
                            volume: 0,
                            duration: 500,
                            onComplete: () => { bgm.stop(); goToVillage(); }
                        });
                    } else {
                        goToVillage();
                    }
                });
            });
        }
    }


    // =========================================================================
    // 🎬 SCENE 3. VillageScene
    //  - 실제 플레이가 이루어지는 웨딩빌리지 맵
    //  - 구성: NPC 배치, 말풍선 연출, 포탈/히든포탈, 발판(충돌 영역), 조작 UI, 플레이어 이동
    // =========================================================================
    class VillageScene extends Phaser.Scene {
        constructor() { super({ key: 'VillageScene' }); }

        init(data) {
            this.myChar = data.character;
            this.isSoundOn = data.isSoundOn;
        }

        // -------------------------------------------------------------------
        // ⚙️ 맵 설정값 (좌표/크기 등을 여기서 한 번에 관리)
        //  - 발판 위치를 바꾸거나, NPC 위치를 옮기고 싶을 때 이 부분만 수정하면 됩니다.
        // -------------------------------------------------------------------

        // 고정 NPC(앉아있는 혼주) 목록: [텍스처, x, y]
        static FIXED_NPCS = [
            { key: 'bride_fa_sit', x: 1180, y: 755 }, // 신부 아버지
            { key: 'bride_mo_sit', x: 1100, y: 755 }, // 신부 어머니
            { key: 'groom_fa_sit', x: 410, y: 645 },  // 신랑 아버지
            { key: 'groom_mo_sit', x: 490, y: 645 },  // 신랑 어머니
        ];

        // 움직이는(애니메이션 있는) NPC 목록
        // prefix: 이미지 파일 접두어, frames: 프레임 수, flipX: 좌우 반전 여부, origin: 기준점
        static MOVING_NPCS = [
            { name: 'GM',     prefix: 'GM',            frames: 10, x: 290,  y: 1085, origin: [0.5, 1] }, // 운영자
            { name: 'spinel', prefix: 'spinel',        frames: 12, x: 1450, y: 1085, origin: [0.5, 1] }, // 스피넬 (맵/오시는 길 안내)
            { name: 'warena', prefix: 'warena',        frames: 8,  x: 650,  y: 1085, origin: [0.5, 1] }, // 워레나 (축의 정보)
            { name: 'groom',  prefix: 'groom_stand1',  frames: 4,  x: 1075, y: 490,  origin: [0.5, 1] }, // 신랑
            { name: 'bride',  prefix: 'bride_stand1',  frames: 4,  x: 1160, y: 490,  origin: [0.5, 1] }, // 신부
            { name: 'camera', prefix: 'camera',        frames: 4,  x: 850,  y: 1085, origin: [0, 1], flipX: true }, // 카메라 안내
            { name: 'letter', prefix: 'letter',        frames: 6,  x: 2100, y: 780,  origin: [0.5, 1], flipX: true }, // 편지 안내
        ];

        // 말풍선 1개짜리(단독) NPC: 4초 주기로 2초간 노출
        //  offset: 말풍선 위치를 NPC 기준 (dx, dy)만큼 보정
        static SPEECH_SINGLE = [
            { npc: 'spinel',   key: 'text_spinel',   dx: -20, dy: -115 },
            { npc: 'warena',   key: 'text_warena',   dx: 20,  dy: -115 },
            { npc: 'camera',   key: 'text_camera',   dx: 60,  dy: -123 },
            { npc: 'letter',   key: 'text_letter',   dx: 20,  dy: -115 },
        ];

        // 고정 NPC(혼주)도 같은 패턴을 쓰지만 별도 목록(고정 NPC 객체를 따로 참조하기 위함)
        static SPEECH_SINGLE_FIXED = [
            { npc: 'bride_fa_sit', key: 'text_bride_pa', dx: -50, dy: -100 },
            { npc: 'groom_fa_sit', key: 'text_groom_pa', dx: 50,  dy: -100 },
        ];

        // 말풍선 2개 릴레이(대화하듯 순서대로) NPC: 7.5초 주기로 [말풍선1 2초] → [0.5초 공백] → [말풍선2 2초]
        static SPEECH_RELAY = [
            { npc: 'bride', key1: 'text_bride_1', key2: 'text_bride_2', dx: 20,  dy: -115 },
            { npc: 'groom', key1: 'text_groom_1', key2: 'text_groom_2', dx: -20, dy: -115 },
            { npc: 'GM',    key1: 'text_GM_1',    key2: 'text_GM_2',    dx: 20,  dy: -115 },
        ];

        // 일반 포탈(SelectScene으로 복귀) 위치
        static MAIN_PORTAL = { x: 120, y: 418 };

        // 히든 포탈: A↔B 형태로 서로 연결되는 짝 목록
        static HIDDEN_PORTAL_PAIRS = [
            { a: { x: 645, y: 655, scale: 1.5 },  b: { x: 175, y: 1095, scale: 1.5 } },
            { a: { x: 1270, y: 750, scale: 1.3 }, b: { x: 1815, y: 1095, scale: 1.3 } },
        ];

        // 발판(충돌 영역) 목록: [x, y, width, height]
        // 시각적으로는 보이지 않는 투명 사각형이며, 캐릭터가 밟고 서는 바닥/계단 역할을 합니다.
        static GROUNDS = [
            [3016 / 2, 1102, 3016, 20], // 맵 전체 바닥
            [200, 420, 550, 20],
            [235, 510, 60, 20],
            [235, 620, 60, 20],
            [50, 460, 65, 20],
            [50, 570, 65, 20],
            [530, 655, 390, 20],
            [860, 710, 100, 20],
            [1150, 770, 350, 20],
            [1400, 790, 5, 10],
            [1470, 845, 5, 10],
            [2063, 895, 1000, 20],
            [1950, 850, 650, 20],
            [1980, 795, 600, 20],
            [1777.5, 1050, 140, 10],
            [1822.5, 995, 140, 10],
            [1865, 940, 140, 10],
            [2350, 1023, 870, 10],
            [2398, 972, 595, 10],
            // 아래는 좁은 계단/발판 구간 (보이지 않는 히트박스. 통과 떨림 방지를 위해 두께를 10px로 확보)
            [995, 660, 3, 10],
            [1060, 630, 3, 10],
            [1100, 580, 3, 10],
            [1175, 550, 3, 10],
            [1240, 535, 3, 10],
            [1300, 505, 3, 10],
            [1330, 445, 3, 10],
            [1335, 390, 3, 10],
            [1325, 335, 3, 10],
            [1290, 285, 3, 10],
            [1220, 255, 3, 10],
            [1145, 270, 3, 10],
            [1065, 275, 3, 10],
            [990, 270, 3, 10],
            [930, 310, 3, 10],
            [915, 365, 3, 10],
            [910, 415, 3, 10],
            [940, 465, 3, 10],
            [990, 510, 3, 10],
            [1055, 545, 3, 10],
            [1110, 500, 100, 20],
        ];

        // 점프 시 적용할 상승 속도 (입력 수단별로 다르게 유지)
        static JUMP_VELOCITY = { keyboard: -550, touch: -400 };

        // "바닥에 닿음" 판정이 한두 프레임 떨려도(물리 떨림) 점프/애니메이션이 영향받지 않도록
        // 마지막으로 바닥에 닿았던 시점부터 이 시간(ms) 안이면 "바닥에 있는 것"으로 인정한다.
        static GROUND_GRACE_MS = 120;

        // 방향키 버튼: [컨트롤명, x, y, 각도]  ※ 1장의 화살표 이미지를 회전시켜 4방향으로 재사용
        static DIRECTION_BUTTONS = [
            { control: 'left',  x: 95,  y: 631, angle: 270 },
            { control: 'right', x: 260, y: 635, angle: 90 },
            { control: 'up',    x: 179, y: 550, angle: 0 },
            { control: 'down',  x: 175, y: 635, angle: 180 },
        ];

        preload() {
            // 고정 NPC(혼주) 이미지
            VillageScene.FIXED_NPCS.forEach(npc => this.load.image(npc.key, `images/${npc.key}.png`));

            // 움직이는 NPC 이미지 시퀀스
            VillageScene.MOVING_NPCS.forEach(npc => loadSequence(this, npc.prefix, 0, npc.frames - 1));

            // 말풍선 이미지 (단독형 + 혼주 단독형 + 릴레이형)
            VillageScene.SPEECH_SINGLE.forEach(s => this.load.image(s.key, `images/${s.key}.png`));
            VillageScene.SPEECH_SINGLE_FIXED.forEach(s => this.load.image(s.key, `images/${s.key}.png`));
            VillageScene.SPEECH_RELAY.forEach(s => {
                this.load.image(s.key1, `images/${s.key1}.png`);
                this.load.image(s.key2, `images/${s.key2}.png`);
            });
        }

        create() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);

            // --- 배경 ---
            this.add.image(0, 0, 'bg_wedding_village').setOrigin(0, 0).setScale(0.5);

            // --- NPC 배치 ---
            const npcRefs = this.createNpcs();

            // { 이름: 스프라이트/이미지 객체 } 형태로 반환
            this.createSpeechBubbles(npcRefs);

            // 말풍선 생성 + 타이머 등록

            // --- 포탈 / 히든 포탈 ---
            this.createPortals();

            // --- 월드/카메라 경계 및 플레이어 ---
            this.physics.world.setBounds(0, 0, 3016, 1245);
            this.cameras.main.setBounds(0, 0, 3016, 1245);

            this.player = this.physics.add.sprite(120, 400, `${this.myChar}_stand1_0`)
                .setScale(1.5).setOrigin(0.5, 1).setCollideWorldBounds(true).setBounce(0).setDepth(10);

            this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

            // 플레이어 점프 애니메이션(상승/정점 각 1프레임)
            this.anims.create({ key: `${this.myChar}_jump_up`, frames: [{ key: `${this.myChar}_jump_0` }], frameRate: 1 });
            this.anims.create({ key: `${this.myChar}_jump_peak`, frames: [{ key: `${this.myChar}_jump_1` }], frameRate: 1 });

            // --- 발판(충돌 영역) 생성 ---
            this.createGrounds();

            // --- 조작 UI (방향키 / 점프 / 사운드) ---
            this.setupControls();
            this.setupSoundButton();

            // --- 디버그용 실시간 마우스 좌표 표시 ---
            this.coordText = this.add.text(0, 0, '(0, 0)', {
                font: '20px Arial',
                fill: '#ffff00',
                backgroundColor: 'rgba(0,0,0,0.7)',
                padding: { x: 5, y: 5 }
            }).setDepth(9999);
        }

        // ---------------------------------------------------------------
        // NPC 생성: FIXED_NPCS(고정) + MOVING_NPCS(애니메이션) 를 한 번에 배치
        // 반환값: { npc이름: 게임오브젝트 } 맵 (말풍선 위치 계산에 사용)
        // ---------------------------------------------------------------
        createNpcs() {
            const refs = {};
            VillageScene.FIXED_NPCS.forEach(npc => {
                refs[npc.key] = this.add.image(npc.x, npc.y, npc.key).setOrigin(0.5, 1).setScale(1.5).setDepth(5);
            });

            VillageScene.MOVING_NPCS.forEach(npc => {
                createAnim(this, `anim_${npc.name}`, npc.prefix, npc.frames);
                const origin = npc.origin || [0.5, 1];
                const sprite = this.add.sprite(npc.x, npc.y, `${npc.prefix}_0`)
                    .setOrigin(origin[0], origin[1])
                    .setScale(1.5)
                    .setDepth(5)
                    .play(`anim_${npc.name}`);
                if (npc.flipX) sprite.setFlipX(true);
                refs[npc.name] = sprite;
            });
            return refs;
        }

        // ---------------------------------------------------------------
        // 말풍선 생성 + 등장 타이머 등록
        //  - 단독형: 0~3초 사이 랜덤 시작 → 이후 4초 주기로 2초씩 노출
        //  - 릴레이형: 0~3초 사이 랜덤 시작 → 이후 7.5초 주기로 [1번 2초]→[0.5초 공백]→[2번 2초]
        // ---------------------------------------------------------------
        createSpeechBubbles(npcRefs) {
            const makeBubble = (npc, key, dx, dy) => this.add.image(npc.x + dx, npc.y + dy, key)
                .setOrigin(0.5, 1).setDepth(12).setVisible(false);

            const allSingle = [...VillageScene.SPEECH_SINGLE, ...VillageScene.SPEECH_SINGLE_FIXED];
            const singleBubbles = allSingle.map(s => makeBubble(npcRefs[s.npc], s.key, s.dx, s.dy));

            const relayBubbles = VillageScene.SPEECH_RELAY.map(s => ({
                b1: makeBubble(npcRefs[s.npc], s.key1, s.dx, s.dy),
                b2: makeBubble(npcRefs[s.npc], s.key2, s.dx, s.dy),
            }));

            // 모든 말풍선 텍스처를 NEAREST 필터로 고정 (흐림 현상 방지)
            [...singleBubbles, ...relayBubbles.flatMap(r => [r.b1, r.b2])].forEach(bubble => {
                if (bubble && bubble.texture) bubble.texture.setFilter(Phaser.Textures.FilterMode.NEAREST);
            });

            // 단독형 말풍선 타이머
            singleBubbles.forEach(bubble => {
                this.time.delayedCall(Phaser.Math.Between(0, 3000), () => {
                    const show = () => {
                        bubble.setVisible(true);
                        this.time.delayedCall(2000, () => bubble.setVisible(false));
                    };
                    show();
                    this.time.addEvent({ delay: 4000, loop: true, callback: show });
                });
            });

            // 릴레이형 말풍선 타이머
            relayBubbles.forEach(({ b1, b2 }) => {
                this.time.delayedCall(Phaser.Math.Between(0, 3000), () => {
                    const showRelay = () => {
                        b1.setVisible(true);
                        this.time.delayedCall(2000, () => {
                            b1.setVisible(false);
                            this.time.delayedCall(500, () => {
                                b2.setVisible(true);
                                this.time.delayedCall(2000, () => b2.setVisible(false));
                            });
                        });
                    };
                    showRelay();
                    this.time.addEvent({ delay: 7500, loop: true, callback: showRelay });
                });
            });
        }

        // ---------------------------------------------------------------
        // 포탈(메인) + 히든 포탈 생성
        //  ※ 원본 코드의 hiden_portal_0 텍스처는 preload에서 로드되지 않은 상태로
        //     애니메이션에 사용되고 있었습니다(1~5만 로드, 0~4 애니메이션 재생).
        //     동작 자체는 원본과 동일하게 유지했으니, 이미지가 깨져 보인다면
        //     hiden_portal_0.png 파일을 추가하거나 로드 범위를 0~4로 바꿔주세요.
        // ---------------------------------------------------------------
        createPortals() {
            this.add.sprite(VillageScene.MAIN_PORTAL.x, VillageScene.MAIN_PORTAL.y, 'portal_0')
                .setOrigin(0.5, 1).setScale(1.5).play('portal_playing');

            createAnim(this, 'hiden_portal_playing', 'hiden_portal', 5);

            VillageScene.HIDDEN_PORTAL_PAIRS.forEach(pair => {
                [pair.a, pair.b].forEach(p => {
                    this.add.sprite(p.x, p.y, 'hiden_portal_0').setOrigin(0.5, 1).setScale(p.scale).play('hiden_portal_playing');
                });
            });
        }

        // ---------------------------------------------------------------
        // 발판(보이지 않는 충돌 영역) 생성 + 플레이어와 충돌 등록
        // ---------------------------------------------------------------
        createGrounds() {
            this.groundObjects = [];
            this.standingOn = null; // 이번 프레임에 실제로 충돌(접지)한 "그 발판 하나" (충돌 콜백에서만 세팅됨)

            VillageScene.GROUNDS.forEach(([x, y, w, h], index) => {
                const ground = this.add.rectangle(x, y, w, h, 0x00ff00, 0);
                this.physics.add.existing(ground, true);
                ground.body.checkCollision.down = false;
                ground.body.checkCollision.left = false;
                ground.body.checkCollision.right = false;
                this.groundObjects.push(ground);

                // 충돌이 "실제로 발생한 프레임"에만 콜백이 호출되므로, 지금 정확히 어떤
                // 발판을 밟고 있는지 이 콜백을 통해서만 판단한다 (overlap 체크보다 정확함).
                this.physics.add.collider(this.player, ground, () => { this.standingOn = ground; });
            });

            // 맨 아래 바닥(0번, 맵 전체를 받치는 발판)은 아래점프로 통과할 수 없는 발판으로 별도 기억
            this.mainFloorGround = this.groundObjects[0];
        }

        // ---------------------------------------------------------------
        // 조작 UI: 방향키 4개 + 점프 버튼 + 키보드 입력 세팅
        // ---------------------------------------------------------------
        // =================================================================
        // 🎮 캐릭터 조작 관련 기능 모음
        //  - 입력 수집(읱력 소스: 키보드+터치 통합) → 좌우이동 → 점프/아래점프
        //    → 포탈 진입 체크 → 애니메이션 결정, 순서로 매 프레임 처리한다.
        //  - 이전에 넣었던 "착지 보정(stick) 속도" 트릭은 오히려 충돌판정을
        //    더 불안정하게 만들어서 제거했다. (PC 깜빡임 + 입력 꼬임의 원인)
        // =================================================================

        setupControls() {
            this.cursors = this.input.keyboard.createCursorKeys();
            this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            // 일부 브라우저는 전체화면 전환 직후 Phaser 키보드 캡처가 불안정해질 수 있어,
            // 브라우저 네이티브 keydown/keyup의 ArrowDown도 보조로 같이 추적한다.
            // (참고용 보조 입력일 뿐, 이동/점프 로직 자체에는 영향을 주지 않는다)
            this.nativeDownKeyHeld = false;
            this._onNativeKeyDown = (e) => { if (e.code === 'ArrowDown') this.nativeDownKeyHeld = true; };
            this._onNativeKeyUp = (e) => { if (e.code === 'ArrowDown') this.nativeDownKeyHeld = false; };
            window.addEventListener('keydown', this._onNativeKeyDown);
            window.addEventListener('keyup', this._onNativeKeyUp);

            this.events.once('shutdown', () => {
                window.removeEventListener('keydown', this._onNativeKeyDown);
                window.removeEventListener('keyup', this._onNativeKeyUp);
            });

            // 전체화면/씬 전환 직후 키보드 입력이 씹히는 것을 막기 위해 캔버스에 포커스를 줌
            this.game.canvas.setAttribute('tabindex', '0');
            this.game.canvas.focus();

            // 다른 창/탭으로 포커스가 넘어가면 keyup 이벤트를 못 받아 키가 "눌린 채로 끼이는"
            // 경우가 있을 수 있어서, 포커스를 잃으면 모든 키 상태를 강제로 초기화한다.
            this._onWindowBlur = () => {
                this.spaceKey.reset();
                this.cursors.up.reset();
                this.cursors.down.reset();
                this.cursors.left.reset();
                this.cursors.right.reset();
                this.nativeDownKeyHeld = false;
                this.touchControls.left = this.touchControls.right = this.touchControls.up = this.touchControls.down = false;
            };
            window.addEventListener('blur', this._onWindowBlur);

            this.events.once('shutdown', () => window.removeEventListener('blur', this._onWindowBlur));

            // 터치 버튼 눌림 상태 (방향키 4개)
            this.touchControls = { left: false, right: false, up: false, down: false };
            this.isJumping = false;        // 공중에 떠 있는 동안(일반 점프든 아래점프든) 다시 점프 못 하게 막는 플래그
            this.isTeleporting = false;
            
            // 💡 1초 딜레이 아래 점프를 위해 필요한 추가 상태 플래그
            this.isPreparingDownJump = false; 

            this.lastGroundedTime = 0;     // 마지막으로 바닥에 닿았던 시각(ms). 코요테 타임 판정에 사용
            this._prevDownPressed = false;
            // 🔍 진단용: 아래키가 "방금 눌렸는지" 판단하기 위한 이전 프레임 상태
            this._prevAirborne = false;
            // 🔍 진단용: "방금 공중으로 전환됐는지" 판단하기 위한 이전 프레임 상태

            // 방향키 버튼 4개를 화살표 이미지 1장으로 회전시켜 생성
            VillageScene.DIRECTION_BUTTONS.forEach(btn => {
                this.add.image(btn.x, btn.y, 'arrow_0')
                    .setAngle(btn.angle).setScale(1.75).setInteractive().setScrollFactor(0).setDepth(9999)
                    .on('pointerdown', () => this.touchControls[btn.control] = true)
                    .on('pointerup', () => this.touchControls[btn.control] = false)
                    .on('pointerout', () => this.touchControls[btn.control] = false); // 손가락이 버튼 밖으로 벗어나도 눌림 해제
            });

            // 점프 버튼 (터치) - 누르는 순간에만 1회 점프 시도 (이 콜백이 점프를 시도하는 유일한 진입점 중 하나)
            const btnStyle = { font: '30px Arial', fill: '#ffffff', backgroundColor: 'rgba(0,0,0,0.5)', padding: { x: 20, y: 20 } };
            this.add.text(1100, 600, '점프', btnStyle).setInteractive().setScrollFactor(0).setDepth(9999)
                .on('pointerdown', () => this.attemptJump(this.readInput().down, VillageScene.JUMP_VELOCITY.touch));
        }

        // ---------------------------------------------------------------
        // 현재 프레임의 입력 상태를 한 곳에서 모아 반환 (키보드 + 터치 통합)
        //  - update()와 점프 버튼 핸들러가 항상 이 함수를 통해서만 입력을 읽도록
        //    통일해서, 입력 소스가 여러 곳에 흩어져 꼬이는 문제를 방지한다.
        // ---------------------------------------------------------------
        readInput() {
            return {
                left: this.touchControls.left || this.cursors.left.isDown,
                right: this.touchControls.right || this.cursors.right.isDown,
                up: this.touchControls.up || this.cursors.up.isDown,
                down: this.touchControls.down || this.cursors.down.isDown || this.nativeDownKeyHeld,
                // "누르고 있는 동안 계속(isDown)"이 아니라 "누르는 순간 단 한 번(JustDown)"만 점프로 인식.
                // 만약 포커스 변경 등으로 keyup 이벤트를 놓쳐 isDown이 계속 true로 남아있어도,
                // JustDown은 실제 keydown이 다시 발생하기 전까지 두 번 다시 true를 반환하지 않는다.
                jump: Phaser.Input.Keyboard.JustDown(this.spaceKey),
            };
        }

        // ---------------------------------------------------------------
        // 사운드 ON/OFF 버튼 + 웨딩빌리지 BGM 재생/일시정지 처리
        // ---------------------------------------------------------------
        setupSoundButton() {
            let bgm = null;

            if (this.cache.audio.exists('bgm_wedding_village')) {
                bgm = this.sound.add('bgm_wedding_village', { loop: true, volume: 0 });

                if (this.isSoundOn) {
                    bgm.play();

                    this.tweens.add({ targets: bgm, volume: 0.5, duration: 1000 });
                }
            }

            const soundBtn = this.add.image(1200, 50, this.isSoundOn ? 'sound_on' : 'sound_off')
                .setInteractive({ useHandCursor: true }).setScale(0.1).setScrollFactor(0).setDepth(9999);

            soundBtn.on('pointerdown', (pointer, localX, localY, event) => {
                if (event) event.stopPropagation();
                if (!bgm) return;

                if (bgm.isPlaying && bgm.volume > 0) {
                    bgm.pause();
                    soundBtn.setTexture('sound_off');
                    this.isSoundOn = false;
                } else {
                    bgm.isPaused ? bgm.resume() : bgm.play();
                    bgm.volume = 0.5;
                    soundBtn.setTexture('sound_on');
                    this.isSoundOn = true;
                }
            });
        }

        // ---------------------------------------------------------------
        // 코요테 타임(여유 판정): 물리 충돌 판정이 한두 프레임 떨려도
        // 애니메이션이 영향받지 않도록, "최근에 바닥에 닿았었는지"로 판단한다.
        // (이동/점프의 실제 동작에는 쓰이지 않는, 화면 표시 전용 보정)
        // ---------------------------------------------------------------
        isGroundedRecently() {
            return (this.time.now - this.lastGroundedTime) <= VillageScene.GROUND_GRACE_MS;
        }

        // =================================================================
        // 🦘 점프 / 아래 점프 — 진입점은 attemptJump() 단 하나뿐이다.
        //  (키보드 스페이스바의 JustDown 시점, 터치 점프 버튼의 pointerdown 시점,
        //   이 두 곳에서만 호출되며, 그 외 어디서도 점프를 발생시키지 않는다)
        // =================================================================

        // downHeld: 점프를 누르는 "그 순간" 아래 방향키도 같이 눌려있었는지
        // jumpVelocity: 일반 점프 시 적용할 상승 속도
        attemptJump(downHeld, jumpVelocity) {
            // 🔍 진단용 로그: 이 함수가 호출될 때마다 어떤 값이 들어왔는지 콘솔에 출력
            console.log('[attemptJump 호출됨]', 'downHeld =', downHeld, '| blocked.down =', this.player.body.blocked.down, '| isJumping =', this.isJumping);

            // 실제로 바닥에 닿아 있어야 하고, 이미 공중에 떠 있으면 무시
            if (!this.player.body.blocked.down || this.isJumping) return;

            if (downHeld) {
                // 맨 밑바닥인지 확인 (바닥이 없거나, 바닥이 맨 아랫층이면 무시)
                if (!this.standingOn || this.standingOn === this.mainFloorGround) return;
                
                // 이미 아래 점프 준비 중이면 무시
                if (this.isPreparingDownJump) return;
                
                // 💡 1초 딜레이 아래 점프를 위해 상태 진입
                this.isPreparingDownJump = true;
                
                // 1초 대기 후 실제 하강 로직 작동 (1000ms. 너무 답답하면 이 숫자를 100이나 200으로 줄여!)
                this.time.delayedCall(1000, () => {
                    this.isPreparingDownJump = false;
                    this.performDownJump();
                });
            } else {
                this.player.setVelocityY(jumpVelocity);
                this.sound.play('bgm_jump');
                this.isJumping = true; // 실제로 바닥에 닿기 전까지는 다시 점프할 수 없음 (연속 점프 방지)
            }
        }

        // ---------------------------------------------------------------
        // 아래 점프: 지금 밟고 있는 "그 발판 하나"만 잠깐 충돌을 꺼서 통과시킨다.
        // (1초 딜레이 타이머가 끝난 뒤 호출됨)
        // ---------------------------------------------------------------
        performDownJump() {
            const target = this.standingOn;
            console.log('[performDownJump 실행됨]', 'target =', target, '| mainFloorGround =', this.mainFloorGround, '| 같은 발판?', target === this.mainFloorGround);

            if (!target || target === this.mainFloorGround) return; // 통과 대상이 없거나 맨 아래 바닥이면 무시

            this.isJumping = true;
            target.body.checkCollision.up = false; // 이 발판 "하나만" 통과 가능하게
            this.player.setVelocityY(150); // 발판을 확실히 통과하도록 아래로 살짝 밀어줌
            this.lastGroundedTime = 0; // 코요테 타임 대기 없이 즉시 점프 모션으로 보이도록

            this.time.delayedCall(400, () => {
                target.body.checkCollision.up = true; // 통과시켰던 발판만 다시 원래대로 복구
            });
        }

        // ---------------------------------------------------------------
        // 매 프레임 갱신
        //  순서: ① 바닥 상태 갱신 → ② 입력 읽기 → ③ 좌우 이동 → ④ 점프(스페이스바)
        //        → ⑤ 포탈 진입 → ⑥ 애니메이션 결정 → ⑦ 프레임 마무리(플래그 리셋)
        // ---------------------------------------------------------------
        update() {
            // 디버그용 마우스 좌표 표시
            const pointer = this.input.activePointer;
            this.coordText.setPosition(pointer.worldX + 15, pointer.worldY + 15);
            this.coordText.setText(`(${Math.round(pointer.worldX)}, ${Math.round(pointer.worldY)})`);

            // ① 바닥 상태 갱신: 실제로 바닥에 닿아있을 때만 "점프 가능" 상태로 리셋,
            //    그리고 코요테 타임 판정을 위한 마지막 접지 시각을 기록한다.
            if (this.player.body.blocked.down) {
                this.isJumping = false;
                this.lastGroundedTime = this.time.now;
            }

            // ② 입력 읽기 (키보드+터치 통합, 한 곳에서만 계산)
            const input = this.readInput();

            // 🔍 진단용 로그: 아래키가 "방금 눌린" 그 순간, 캐릭터의 실제 위치와 접지 상태를 출력
            if (input.down && !this._prevDownPressed) {
                const g = this.standingOn;
                console.log(
                    '[DOWN 눌림]',
                    'player(x,y) =', this.player.x.toFixed(1), this.player.y.toFixed(1),
                    '| blocked.down =', this.player.body.blocked.down,
                    '| velocity.y =', this.player.body.velocity.y.toFixed(1),
                    '| standingOn(x,y,w,h) =', g ? `${g.x}, ${g.y}, ${g.width}, ${g.height}` : null
                );
            }
            this._prevDownPressed = input.down;

            // ③ 좌우 이동 (아래 방향키를 누르고 있거나 1초 대기 상태일 때는 이동하지 않는다)
            if (this.isPreparingDownJump || input.down) {
                this.player.setVelocityX(0);
            } else if (input.left) {
                this.player.setVelocityX(-198).setFlipX(false);
            } else if (input.right) {
                this.player.setVelocityX(198).setFlipX(true);
            } else {
                this.player.setVelocityX(0);
            }

            // ④ 점프 (스페이스바를 "누르는 순간"에만 1회 시도).
            // attemptJump 내부에서 아래 방향키가 같이 눌려있으면 자동으로 아래 점프로 분기된다.
            // (1초 대기 중에 추가로 점프키가 먹히지 않게 isPreparingDownJump 조건 추가)
            if (input.jump && !this.isPreparingDownJump) {
                this.attemptJump(input.down, VillageScene.JUMP_VELOCITY.keyboard);
            }

            // ⑤ 포탈/히든포탈 진입 체크 (방향키 위 + 포탈 근처일 때)
            // 1초 하강 대기 중에는 포탈도 막습니다.
            if (input.up && !this.isTeleporting && !this.isPreparingDownJump) {
                this.checkPortalEntry();
            }

            // ⑥ 애니메이션 결정: 공중(점프) > 아래방향(엎드림) > 좌우이동(걷기) > 대기(숨쉬기)
            const isAirborne = !this.isGroundedRecently();

            // 🔍 진단용 로그: "방금" 공중 상태로 바뀐 그 프레임의 상세 정보 출력
            if (isAirborne && !this._prevAirborne) {
                console.log(
                    '[공중 전환됨]',
                    'player(x,y) =', this.player.x.toFixed(1), this.player.y.toFixed(1),
                    '| velocity.y =', this.player.body.velocity.y.toFixed(1),
                    '| input.down =', input.down,
                    '| isJumping =', this.isJumping
                );
            }
            this._prevAirborne = isAirborne;

            // 💡 1초간 아래 점프 준비 중일 때 & 아래 키 누르고 있을 때 강제 Prone 이미지 적용
            if (this.isPreparingDownJump) {
                this.player.anims.stop();
                this.player.setTexture(`${this.myChar}_prone`);
            } else if (isAirborne) {
                const anim = Math.abs(this.player.body.velocity.y) < 50 ? 'jump_peak' : 'jump_up';
                this.player.anims.play(`${this.myChar}_${anim}`, true);
            } else if (input.down) {
                this.player.anims.stop();
                this.player.setTexture(`${this.myChar}_prone`);
            } else if (input.left || input.right) {
                this.player.anims.play(`${this.myChar}_walking`, true);
            } else {
                this.player.anims.play(`${this.myChar}_breathing`, true);
            }

            // ⑦ 프레임 마무리: "지금 밟고 있는 발판" 정보를 리셋해서, 다음 프레임에
            //    실제로 충돌이 일어났을 때만(콜백을 통해) 다시 채워지도록 한다.
            this.standingOn = null;
        }

        // ---------------------------------------------------------------
        // 메인 포탈(맵 나가기) 또는 히든 포탈(짝 이동) 근처인지 확인 후 처리
        // ---------------------------------------------------------------
        checkPortalEntry() {
            const dist = (x, y) => Phaser.Math.Distance.Between(this.player.x, this.player.y, x, y);
            const PORTAL_RANGE = 50;

            // 메인 포탈: 캐릭터 선택 화면으로 복귀
            if (dist(VillageScene.MAIN_PORTAL.x, VillageScene.MAIN_PORTAL.y) < PORTAL_RANGE) {
                this.isTeleporting = true;
                this.sound.play('bgm_portal');
                this.cameras.main.fadeOut(1000, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    this.game.sound.stopAll();
                    this.scene.start('SelectScene');
                });
                return;
            }

            // 히든 포탈: A 근처면 B로, B 근처면 A로 즉시 이동
            for (const pair of VillageScene.HIDDEN_PORTAL_PAIRS) {
                if (dist(pair.a.x, pair.a.y) < PORTAL_RANGE) return this.executeTeleport(pair.b.x, pair.b.y);
                if (dist(pair.b.x, pair.b.y) < PORTAL_RANGE) return this.executeTeleport(pair.a.x, pair.a.y);
            }
        }

        // 히든 포탈 순간이동 처리 (효과음 + 위치 이동 + 0.3초 후 재이동 가능)
        executeTeleport(targetX, targetY) {
            this.isTeleporting = true;
            this.sound.play('bgm_tel');
            this.player.setPosition(targetX, targetY);
            this.time.delayedCall(300, () => { this.isTeleporting = false; });
        }
    }


    // =========================================================================
    // 🧱 렌더러 및 물리 설정
    // =========================================================================
    const config = {
        type: Phaser.AUTO,
        width: 1280,
        height: 720,
        parent: 'game-container',
        render: {
            pixelArt: true,
            roundPixels: true // 카메라/오브젝트 소수점 좌표 연산 방지 (흐림 현상 제거)
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 1200 },
                roundPixels: true // 물리 바운딩 박스 정수 변환 처리
            }
        },
        input: {
            activePointers: 3 // 모바일 동시 터치(방향키+점프 등) 인식을 위해 다중 포인터 추적 활성화
        },
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [StartScene, SelectScene, VillageScene]
    };
    new Phaser.Game(config);
</script>
</body>
