<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>이승원,이유진 결혼합니다.</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 1; }
        #portrait-warning { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #ffffff; color: #000000; display: none; justify-content: center; align-items: center; z-index: 9999; text-align: center; font-family: "Arial", sans-serif; }
        @media screen and (orientation: portrait) { #portrait-warning { display: flex; } }
    </style>
</head>
<body>
<div id="portrait-warning"><h1>📱<br><br>화면을 가로로 돌려주세요!</h1></div>
<div id="game-container"></div>

<script>
    class StartScene extends Phaser.Scene {
        constructor() { super({ key: 'StartScene' }); }
        preload() {
            for (let i = 0; i <= 20; i++) this.load.image(`invit_${i}`, `images/invit_${i}.png`);
            this.load.image('bg_select', 'images/bg_select.png'); 
            this.load.image('sign', 'images/sign.png'); 
            this.load.image('title_sign', 'images/title_sign.png'); 
            this.load.image('title', 'images/title.png'); 
            
            this.load.image('sound_on', 'images/sound_on.png');
            this.load.image('sound_off', 'images/sound_off.png');
            this.load.audio('bgm_select', 'audio/bgm_select.mp3');

            this.load.image('bg_wedding_village', 'images/bg_wedding_village.png');
            this.load.audio('bgm_wedding_village', 'audio/bgm_wedding_village.mp3');

            const chars = ['man', 'woman', 'toben'];
            chars.forEach(char => {
                for(let z=0; z<=3; z++) this.load.image(`${char}_stand1_${z}`, `images/${char}_stand1_${z}.png`);
                for(let z=0; z<=4; z++) this.load.image(`${char}_walk1_${z}`, `images/${char}_walk1_${z}.png`);
                for(let z=0; z<=1; z++) this.load.image(`${char}_jump_${z}`, `images/${char}_jump_${z}.png`);
            });
            // 이미지 로드
            for (let i = 0; i <= 7; i++) this.load.image(`portal_${i}`, `images/portal_${i}.png`);
            for (let i = 1; i <= 5; i++) this.load.image(`hiden_portal_${i}`, `images/hiden_portal_${i}.png`);
            for (let i = 0; i <= 5; i++) this.load.image(`sprite_${i}`, `images/sprite_${i}.png`);
        }
        create() {
            this.anims.create({ key: 'invit_playing', frames: Array.from({length:21}, (_,i)=>({key:`invit_${i}`})), frameRate: 12, repeat: -1 });
            this.add.sprite(640, 360, 'invit_0').setScale(2).play('invit_playing').setInteractive().on('pointerup', () => {
                try { if (!this.scale.isFullscreen) this.scale.startFullscreen(); } catch (e) {}
                
                this.cameras.main.fadeOut(1000, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    this.scene.start('SelectScene');
                });
            });
        }
    }

    class SelectScene extends Phaser.Scene {
        constructor() { super({ key: 'SelectScene' }); }
        preload() {}

        create() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);

            this.selectedChar = ""; 
            this.isSoundOn = false; 
            
            this.add.image(640, 360, 'bg_select').setDisplaySize(1280, 720);
            this.add.image(125, 170, 'title_sign').setScale(0.25);
            
            this.anims.create({ key: 'portal_playing', frames: Array.from({length: 8}, (_, i) => ({ key: `portal_${i}` })), frameRate: 5, repeat: -1 });
            this.add.sprite(300, 500, 'portal_0').setOrigin(0.2, 1).setScale(1.5).play('portal_playing');

            this.anims.create({ key: 'spotlight_playing', frames: Array.from({length: 6}, (_, i) => ({ key: `sprite_${i}` })), frameRate: 10, repeat: -1 });
            this.spotlight = this.add.sprite(-200, -200, 'sprite_0').setScale(2).play('spotlight_playing').setVisible(false);

            this.add.image(660, 170, 'title').setScale(0.45);

            let soundBtn = this.add.image(1200, 50, 'sound_off').setInteractive({ useHandCursor: true }).setScale(0.1);
            let bgm = null;
            if (this.cache.audio.exists('bgm_select')) {
                bgm = this.sound.add('bgm_select', { loop: true, volume: 0.5 });
            }
            soundBtn.on('pointerdown', (pointer, localX, localY, event) => {
                if (event) event.stopPropagation();
                if (!bgm) return; 
                if (bgm.isPlaying) {
                    bgm.pause(); 
                    soundBtn.setTexture('sound_off'); 
                    this.isSoundOn = false;
                } else {
                    if (bgm.isPaused) { bgm.resume(); } else { bgm.play(); }
                    soundBtn.setTexture('sound_on'); 
                    this.isSoundOn = true;
                }
            });

            const chars = ['man', 'woman', 'toben'];
            chars.forEach(char => {
                this.anims.create({ key: `${char}_breathing`, frames: [ { key: `${char}_stand1_0` }, { key: `${char}_stand1_0` }, { key: `${char}_stand1_1` }, { key: `${char}_stand1_1` }, { key: `${char}_stand1_2` }, { key: `${char}_stand1_2` }, { key: `${char}_stand1_3` }, { key: `${char}_stand1_3` } ], frameRate: 6, repeat: -1 });
                this.anims.create({ key: `${char}_walking`, frames: [ { key: `${char}_walk1_0` }, { key: `${char}_walk1_1` }, { key: `${char}_walk1_2` }, { key: `${char}_walk1_3` }, { key: `${char}_walk1_4` } ], frameRate: 6, repeat: -1 });
            });
            let manBtn = this.add.sprite(500, 550, 'man_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('man_breathing');
            let womanBtn = this.add.sprite(725, 550, 'woman_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('woman_breathing');
            let tobenBtn = this.add.sprite(950, 550, 'toben_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('toben_breathing');
            
            const selectCharacter = (targetBtn, charName) => {
                [manBtn, womanBtn, tobenBtn].forEach(b => { b.setAlpha(0.5); b.play(b.texture.key.split('_')[0] + '_breathing'); });
                targetBtn.setAlpha(1).play(`${charName}_walking`);
                this.selectedChar = charName; 
                this.spotlight.setVisible(true).setPosition(targetBtn.x, targetBtn.y - 250);
            };
            manBtn.on('pointerdown', () => selectCharacter(manBtn, 'man'));
            womanBtn.on('pointerdown', () => selectCharacter(womanBtn, 'woman'));
            tobenBtn.on('pointerdown', () => selectCharacter(tobenBtn, 'toben'));
            
            this.add.image(1150, 305, 'sign').setScale(0.3).setInteractive().on('pointerdown', () => { 
                if(this.selectedChar) {
                    this.cameras.main.fadeOut(1000, 0, 0, 0);
                    this.cameras.main.once('camerafadeoutcomplete', () => {
                        if (bgm && bgm.isPlaying) {
                            this.tweens.add({
                                targets: bgm,
                                volume: 0,
                                duration: 500,
                                onComplete: () => {
                                    bgm.stop();
                                    this.scene.start('VillageScene', { character: this.selectedChar, isSoundOn: this.isSoundOn }); 
                                }
                            });
                        } else {
                            this.scene.start('VillageScene', { character: this.selectedChar, isSoundOn: this.isSoundOn }); 
                        }
                    });
                }
            });
        }
    }

    class VillageScene extends Phaser.Scene {
        constructor() { super({ key: 'VillageScene' }); }
        init(data) { 
            this.myChar = data.character; 
            this.isSoundOn = data.isSoundOn;
        }

        // =======================================================
        // 📥 [추가] 신규 NPC 및 말풍선 이미지 리소스 로드 구역
        // =======================================================
        preload() {
            // 1. 고정 NPC 이미지 로드
            this.load.image('bride_fa_sit', 'images/bride_fa_sit.png');
            this.load.image('bride_mo_sit', 'images/bride_mo_sit.png');
            this.load.image('groom_fa_sit', 'images/groom_fa_sit.png');
            this.load.image('groom_mo_sit', 'images/groom_mo_sit.png');

            // 2. 움직이는 NPC 이미지 시퀀스 로드
            for (let i = 0; i <= 9; i++) this.load.image(`GM_${i}`, `images/GM_${i}.png`);
            for (let i = 0; i <= 11; i++) this.load.image(`spinel_${i}`, `images/spinel_${i}.png`);
            for (let i = 0; i <= 7; i++) this.load.image(`warena_${i}`, `images/warena_${i}.png`);

            // 3. 패턴 1개짜리 말풍선 로드
            this.load.image('text_spinel', 'images/text_spinel.png');
            this.load.image('text_warena', 'images/text_warena.png');
            this.load.image('text_bride_pa', 'images/text_bride_pa.png');
            this.load.image('text_groom_pa', 'images/text_groom_pa.png');

            // 4. 패턴 2개짜리 말풍선 로드
            this.load.image('text_bride_1', 'images/text_bride_1.png');
            this.load.image('text_bride_2', 'images/text_bride_2.png');
            this.load.image('text_groom_1', 'images/text_groom_1.png');
            this.load.image('text_groom_2', 'images/text_groom_2.png');
            this.load.image('text_GM_1', 'images/text_GM_1.png');
            this.load.image('text_GM_2', 'images/text_GM_2.png');
        }

        create() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);

            this.add.image(0, 0, 'bg_wedding_village').setOrigin(0, 0).setScale(0.5);

            // =======================================================
            // 👥 [추가] NPC 애니메이션 생성 및 맵 배치 구역
            // =======================================================
            // 움직이는 NPC 전용 애니메이션 데이터 생성
            this.anims.create({ key: 'anim_GM', frames: Array.from({length: 10}, (_, i) => ({ key: `GM_${i}` })), frameRate: 6, repeat: -1 });
            this.anims.create({ key: 'anim_spinel', frames: Array.from({length: 12}, (_, i) => ({ key: `spinel_${i}` })), frameRate: 6, repeat: -1 });
            this.anims.create({ key: 'anim_warena', frames: Array.from({length: 8}, (_, i) => ({ key: `warena_${i}` })), frameRate: 6, repeat: -1 });

            // 보기가 편하도록 메인 바닥선 높이(1120)에 맞추어 일렬 횡대로 임의 분산 배치
            const floorY = 1120;

            // (1) 고정 NPC 배치 생성
            let npc_bride_fa = this.add.image(400, floorY, 'bride_fa_sit').setOrigin(0.5, 1).setScale(1.5).setDepth(5); // 신부 아버지 NPC
            let npc_bride_mo = this.add.image(550, floorY, 'bride_mo_sit').setOrigin(0.5, 1).setScale(1.5).setDepth(5); // 신부 어머니 NPC
            let npc_groom_fa = this.add.image(700, floorY, 'groom_fa_sit').setOrigin(0.5, 1).setScale(1.5).setDepth(5); // 신랑 아버지 NPC
            let npc_groom_mo = this.add.image(850, floorY, 'groom_mo_sit').setOrigin(0.5, 1).setScale(1.5).setDepth(5); // 신랑 어머니 NPC

            // (2) 움직이는 NPC 배치 생성 및 애니메이션 가동
            let npc_GM = this.add.sprite(1100, floorY, 'GM_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).play('anim_GM'); // 운영자
            let npc_spinel = this.add.sprite(1350, floorY, 'spinel_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).play('anim_spinel'); // 스피넬, 맵 안내, 오시는 길 안내
            let npc_warena = this.add.sprite(1600, floorY, 'warena_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).play('anim_warena'); // 워레나, 축의 정보

            // 신랑, 신부는 별도의 독립 NPC 오브젝트가 없으므로 말풍선 단독 연출을 위한 가상 좌표 설정
            const groomBubbleX = 1900, groomBubbleY = floorY; // 신랑 말풍선 가상 위치
            const brideBubbleX = 2250, brideBubbleY = floorY; // 신부 말풍선 가상 위치


            // =======================================================
            // 💬 [추가] 말풍선 노출 및 루프 애니메이션 효과 구역
            // =======================================================
            // [패턴 1] 말풍선 1개 연출 등록 (머리 위 y축 -135 여유 배치)
            let bubble_spinel = this.add.image(npc_spinel.x, npc_spinel.y - 135, 'text_spinel').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 스피넬 말풍선
            let bubble_warena = this.add.image(npc_warena.x, npc_warena.y - 135, 'text_warena').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 워레나 말풍선
            let bubble_bride_pa = this.add.image(npc_bride_fa.x, npc_bride_fa.y - 135, 'text_bride_pa').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 신부 혼주 말풍선
            let bubble_groom_pa = this.add.image(npc_groom_fa.x, npc_groom_fa.y - 135, 'text_groom_pa').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 신랑 혼주 말풍선

            // 패턴 1 타이머 구동 설정 (4초 주기 루프: 2초간 켜짐 -> 2초간 꺼짐 반복)
            this.time.addEvent({
                delay: 4000,
                loop: true,
                callback: () => {
                    [bubble_spinel, bubble_warena, bubble_bride_pa, bubble_groom_pa].forEach(b => b.setVisible(true));
                    this.time.delayedCall(2000, () => {
                        [bubble_spinel, bubble_warena, bubble_bride_pa, bubble_groom_pa].forEach(b => b.setVisible(false));
                    });
                }
            });

            // [패턴 2] 말풍선 2개 릴레이 연출 등록
            let bubble_bride_1 = this.add.image(brideBubbleX, brideBubbleY - 135, 'text_bride_1').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 신부 말풍선 1
            let bubble_bride_2 = this.add.image(brideBubbleX, brideBubbleY - 135, 'text_bride_2').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 신부 말풍선 2

            let bubble_groom_1 = this.add.image(groomBubbleX, groomBubbleY - 135, 'text_groom_1').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 신랑 말풍선 1
            let bubble_groom_2 = this.add.image(groomBubbleX, groomBubbleY - 135, 'text_groom_2').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 신랑 말풍선 2

            let bubble_GM_1 = this.add.image(npc_GM.x, npc_GM.y - 135, 'text_GM_1').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 운영자 말풍선 1
            let bubble_GM_2 = this.add.image(npc_GM.x, npc_GM.y - 135, 'text_GM_2').setOrigin(0.5, 1).setScale(1.2).setDepth(6).setVisible(false); // 운영자 말풍선 2

            // 패턴 2 타이머 구동 설정 (7.5초 주기 루프: 1번 2초 작동 -> 0.5초 대기 -> 2번 2초 작동 -> 3초 완전 소멸 대기 반복)
            this.time.addEvent({
                delay: 7500,
                loop: true,
                callback: () => {
                    // 첫 번째 말풍선 일제히 등장
                    bubble_bride_1.setVisible(true);
                    bubble_groom_1.setVisible(true);
                    bubble_GM_1.setVisible(true);

                    this.time.delayedCall(2000, () => {
                        // 2초 뒤 첫 번째 소멸
                        bubble_bride_1.setVisible(false);
                        bubble_groom_1.setVisible(false);
                        bubble_GM_1.setVisible(false);

                        this.time.delayedCall(500, () => {
                            // 0.5초간의 대화 공백을 가진 뒤 두 번째 말풍선 등장
                            bubble_bride_2.setVisible(true);
                            bubble_groom_2.setVisible(true);
                            bubble_GM_2.setVisible(true);

                            this.time.delayedCall(2000, () => {
                                // 2초 뒤 두 번째 말풍선 최종 퇴장
                                bubble_bride_2.setVisible(false);
                                bubble_groom_2.setVisible(false);
                                bubble_GM_2.setVisible(false);
                            });
                        });
                    });
                }
            });
            // =======================================================

            // 🌀 [포탈 생성 구역] 지정된 좌표에 항상 재생되는 포탈 추가
            this.add.sprite(120, 418, 'portal_0').setOrigin(0.5, 1).setScale(1.5).play('portal_playing');

            // =======================================================
            // 🤫 [히든 포탈 생성 구역]
            // =======================================================
            // 1. 0번부터 5번 프레임을 엮어서 'hiden_portal_playing'이라는 애니메이션을 만듭니다.
            this.anims.create({
                key: 'hiden_portal_playing',
                frames: Array.from({ length: 5 }, (_, i) => ({ key: `hiden_portal_${i}` })),
                frameRate: 6, // 재생 속도 (숫자가 클수록 빨라짐)
                repeat: -1    // 무한 반복
            });

            // 2. 요청하신 좌표에 히든 포탈을 배치하고 애니메이션을 틀어줍니다.
            this.add.sprite(645, 655, 'hiden_portal_0').setOrigin(0.5, 1).setScale(1.5).play('hiden_portal_playing');
            this.add.sprite(1270, 750, 'hiden_portal_0').setOrigin(0.5, 1).setScale(1.3).play('hiden_portal_playing');
            this.add.sprite(1815, 1095, 'hiden_portal_0').setOrigin(0.5, 1).setScale(1.3).play('hiden_portal_playing');
            this.add.sprite(175, 1095, 'hiden_portal_0').setOrigin(0.5, 1).setScale(1.5).play('hiden_portal_playing');
             // =======================================================

            this.physics.world.setBounds(0, 0, 3016, 1245);
            this.cameras.main.setBounds(0, 0, 3016, 1245);
            
            // 스폰 좌표
            this.player = this.physics.add.sprite(120, 400, `${this.myChar}_stand1_0`).setScale(1.5).setOrigin(0.5, 1).setCollideWorldBounds(true).setBounce(0).setDepth(10);
            
            this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

            this.anims.create({ key: `${this.myChar}_jump_up`, frames: [{ key: `${this.myChar}_jump_0` }], frameRate: 1 });
            this.anims.create({ key: `${this.myChar}_jump_peak`, frames: [{ key: `${this.myChar}_jump_1` }], frameRate: 1 });
            
            // =======================================================
            // 🧱 다중 바닥 및 발판 설정 구역 (알려주신 좌표 적용)
            // =======================================================
            let grounds = [
                // 전체 바닥
                this.add.rectangle(3016/2, 1245-115, 3016, 20, 0x00ff00, 0),    

                //  스폰 장소 발판
                this.add.rectangle(200, 450, 550, 20, 0x00ff00, 0),
                this.add.rectangle(235, 540, 60, 20, 0x00ff00, 0),
                this.add.rectangle(235, 650, 60, 20, 0x00ff00, 0),
                this.add.rectangle(50, 490, 65, 20, 0x00ff00, 0),
                this.add.rectangle(50, 600, 65, 20, 0x00ff00, 0),
                // 신랑 혼주 발판(+오른쪽 발판)
                this.add.rectangle(530, 685, 390, 20, 0x00ff00, 0),
                this.add.rectangle(860, 740, 100, 20, 0x00ff00, 0),
                // 신부 혼주 발판(+오른쪽 발판 2)
                this.add.rectangle(1150, 800, 350, 20, 0x00ff00, 0),
                this.add.rectangle(1400, 820, 5, 10, 0x00ff00, 0),
                this.add.rectangle(1470, 875, 5, 10, 0x00ff00, 0),
                // 성당 잔디 위 발판
                this.add.rectangle(2063, 925, 1000, 20, 0x00ff00, 0),
                this.add.rectangle(1950, 880, 650, 20, 0x00ff00, 0),
                this.add.rectangle(1980, 825, 600, 20, 0x00ff00, 0),
                // 성당 계단
                this.add.rectangle(1777.5, 1080, 140, 10, 0x00ff00, 0),
                this.add.rectangle(1822.5, 1025, 140, 10, 0x00ff00, 0),
                this.add.rectangle(1865, 970, 140, 10, 0x00ff00, 0),
                
                // 웨딩카
                this.add.rectangle(2350, 1053, 870, 10, 0x00ff00, 0),
                this.add.rectangle(2398, 1002, 595, 10, 0x00ff00, 0),

                // 하트 구름
                this.add.rectangle(995, 690, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1060, 660, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1100, 610, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1175, 580, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1240, 565, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1300, 535, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1330, 475, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1335, 420, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1325, 365, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1290, 315, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1220, 285, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1145, 300, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1065, 305, 3, 2, 0x00ff00, 0),
                this.add.rectangle(990, 300, 3, 2, 0x00ff00, 0),
                this.add.rectangle(930, 340, 3, 2, 0x00ff00, 0),
                this.add.rectangle(915, 395, 3, 2, 0x00ff00, 0),
                this.add.rectangle(910, 445, 3, 2, 0x00ff00, 0),
                this.add.rectangle(940, 495, 3, 2, 0x00ff00, 0),
                this.add.rectangle(990, 540, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1055, 575, 3, 2, 0x00ff00, 0),
                this.add.rectangle(1110, 530, 100, 20, 0x00ff00, 0)
                
            ];

            grounds.forEach(ground => {
                this.physics.add.existing(ground, true); 
                ground.body.checkCollision.down = false;  
                ground.body.checkCollision.left = false;  
                ground.body.checkCollision.right = false; 
                this.physics.add.collider(this.player, ground); 
            });
            // =======================================================
            
            // ⌨️ 키보드 설정
            this.cursors = this.input.keyboard.createCursorKeys();
            this.altKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ALT);
            this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            this.controls = { left: false, right: false, up: false, down: false };
            this.isJumping = false;
            
            // 💡 텔레포트 쿨타임 및 무한루프 방지용 변수
            this.isTeleporting = false; 

            const btnStyle = { font: '30px Arial', fill: '#ffffff', backgroundColor: 'rgba(0,0,0,0.5)', padding: {x: 20, y: 20} };
            
            let leftBtn = this.add.text(80, 600, '◀', btnStyle).setInteractive().setScrollFactor(0);
            leftBtn.on('pointerdown', () => this.controls.left = true).on('pointerup', () => this.controls.left = false);
            
            let rightBtn = this.add.text(200, 600, '▶', btnStyle).setInteractive().setScrollFactor(0);
            rightBtn.on('pointerdown', () => this.controls.right = true).on('pointerup', () => this.controls.right = false);

            let upBtn = this.add.text(140, 510, '▲', btnStyle).setInteractive().setScrollFactor(0);
            upBtn.on('pointerdown', () => this.controls.up = true).on('pointerup', () => this.controls.up = false);

            let downBtn = this.add.text(140, 690, '▼', btnStyle).setInteractive().setScrollFactor(0);
            downBtn.on('pointerdown', () => this.controls.down = true).on('pointerup', () => this.controls.down = false);
            
            let jumpBtn = this.add.text(1100, 600, '점프', btnStyle).setInteractive().setScrollFactor(0);
            jumpBtn.on('pointerdown', () => { 
                if (this.player.body.blocked.down) {
                    this.player.setVelocityY(-300); 
                    this.isJumping = true;
                }
            });

            let soundBtn = this.add.image(1200, 50, this.isSoundOn ? 'sound_on' : 'sound_off').setInteractive({ useHandCursor: true }).setScale(0.1).setScrollFactor(0);
            let bgm = null;

            if (this.cache.audio.exists('bgm_wedding_village')) {
                bgm = this.sound.add('bgm_wedding_village', { loop: true, volume: 0 });
                
                if (this.isSoundOn) {
                    bgm.play();
                    this.tweens.add({ targets: bgm, volume: 0.5, duration: 1000 });
                }
            }

            soundBtn.on('pointerdown', (pointer, localX, localY, event) => {
                if (event) event.stopPropagation();
                if (!bgm) return; 

                if (bgm.isPlaying && bgm.volume > 0) {
                    bgm.pause(); 
                    soundBtn.setTexture('sound_off'); 
                    this.isSoundOn = false;
                } else {
                    if (bgm.isPaused) bgm.resume();
                    else bgm.play();
                    bgm.volume = 0.5;
                    soundBtn.setTexture('sound_on'); 
                    this.isSoundOn = true;
                }
            });

            // =======================================================
            // 🖱️ [마우스 좌표 관련 커서] 실시간 좌표 텍스트 생성
            // =======================================================
            this.coordText = this.add.text(0, 0, '(0, 0)', {
                font: '20px Arial',
                fill: '#ffff00', // 눈에 잘 띄는 노란색
                backgroundColor: 'rgba(0,0,0,0.7)', // 가독성을 위한 반투명 배경
                padding: { x: 5, y: 5 }
            }).setDepth(9999); // 제일 위에 보이도록 설정
            // =======================================================
        }

        update() {
            // =======================================================
            // 🖱️ [마우스 좌표 관련 커서] 마우스 위치에 따라 텍스트 이동 및 값 업데이트
            // =======================================================
            let pointer = this.input.activePointer;
            // 마우스 커서의 우측 하단으로 살짝 띄워서 표시 (가려지지 않게)
            this.coordText.setPosition(pointer.worldX + 15, pointer.worldY + 15);
            // Math.round를 사용해 소수점을 제거하고 깔끔한 정수로 송출
            this.coordText.setText(`(${Math.round(pointer.worldX)}, ${Math.round(pointer.worldY)})`);
            // =======================================================

            if (this.player.body.blocked.down) this.isJumping = false;
            
            let moveLeft = this.controls.left || this.cursors.left.isDown;
            let moveRight = this.controls.right || this.cursors.right.isDown;
            let moveUp = this.controls.up || this.cursors.up.isDown;
            let moveDown = this.controls.down || this.cursors.down.isDown;
            
            //let jumpPressed = this.altKey.isDown;
            let jumpPressed = this.spaceKey.isDown;

            if (moveLeft) { 
                this.player.setVelocityX(-198).setFlipX(false); 
            } else if (moveRight) { 
                this.player.setVelocityX(198).setFlipX(true); 
            } else { 
                this.player.setVelocityX(0); 
            }

            if (jumpPressed && this.player.body.blocked.down) {
                this.player.setVelocityY(-550);
                this.isJumping = true;
            }

            // =======================================================
            // 🌀 [포탈 텔레포트 기능 구현 구역]
            // =======================================================
            // 현재 텔레포트 중이 아닐 때만 윗 방향키 입력을 받음
            if (moveUp && !this.isTeleporting) {
                // 1. 백포털 (120, 418) -> SelectScene (하객룩 선택창으로 이동, 1초 페이드아웃)
                if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 120, 418) < 50) {
                    this.isTeleporting = true;
                    this.cameras.main.fadeOut(1000, 0, 0, 0); // 500에서 1000(1초)로 변경
                    this.cameras.main.once('camerafadeoutcomplete', () => {
                        this.game.sound.stopAll(); // 마을 배경음악 정지
                        this.scene.start('SelectScene');
                    });
                }
                // 2-A. 히든포털 1 (645, 655) -> (175, 1095)
                else if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 645, 655) < 50) {
                    this.executeTeleport(175, 1095);
                }
                // 2-B. 히든포털 1 (175, 1095) -> (645, 655)
                else if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 175, 1095) < 50) {
                    this.executeTeleport(645, 655);
                }
                // 3-A. 히든포털 2 (1270, 750) -> (1815, 1095)
                else if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 1270, 750) < 50) {
                    this.executeTeleport(1815, 1095);
                }
                // 3-B. 히든포털 2 (1815, 1095) -> (1270, 750)
                else if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 1815, 1095) < 50) {
                    this.executeTeleport(1270, 750);
                }
            }
            // =======================================================

            if (this.isJumping) {
                if (Math.abs(this.player.body.velocity.y) < 50) { this.player.anims.play(`${this.myChar}_jump_peak`, true); } 
                else { this.player.anims.play(`${this.myChar}_jump_up`, true); }
            } else {
                if (moveLeft || moveRight) { this.player.anims.play(`${this.myChar}_walking`, true); } 
                else { this.player.anims.play(`${this.myChar}_breathing`, true); }
            }
        }

        // 💡 맵 내부에서 순간이동 시키는 전용 함수 (페이드 효과 제거, 쿨타임 0.2초)
        executeTeleport(targetX, targetY) {
            this.isTeleporting = true; // 무한루프 방지 잠금
            this.player.setPosition(targetX, targetY); // 지정된 좌표로 즉시 이동
            
            // 0.3초(300ms) 뒤에 다시 텔레포트 가능하도록 잠금 해제
            this.time.delayedCall(300, () => { this.isTeleporting = false; });
        }
    }

    const config = { 
        type: Phaser.AUTO, 
        width: 1280, 
        height: 720, 
        parent: 'game-container', 
        render: { pixelArt: true },
        physics: { default: 'arcade', arcade: { gravity: { y: 1800 } } }, 
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, 
        scene: [StartScene, SelectScene, VillageScene] 
    };
    new Phaser.Game(config);
</script>
</body>
</html>
