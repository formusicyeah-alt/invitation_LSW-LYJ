<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>이승원,이유진 결혼합니다.</title>
    <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js)"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 1; }
        #portrait-warning { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #ffffff; color: #000000; display: none; justify-content: center; align-items: center; z-index: 9999; text-align: center; font-family: "Arial", sans-serif; }
        @media screen and (orientation: portrait) { #portrait-warning { display: flex; } }
        canvas {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        * {
            cursor: url('images/click_0.png'), auto !important;
        }
    </style>
</head>
<body>
<div id="portrait-warning"><h1>📱<br><br>화면을 가로로 돌려주세요!</h1></div>
<div id="game-container"></div>

<script>
    // =========================================================================
    // 📦 공용 헬퍼 함수
    // =========================================================================

    function loadSequence(scene, prefix, start, end) {
        for (let i = start; i <= end; i++) {
            scene.load.image(`${prefix}_${i}`, `images/${prefix}_${i}.png`);
        }
    }

    function createAnim(scene, key, prefix, frameCount, frameRate = 6, repeat = -1) {
        scene.anims.create({
            key,
            frames: Array.from({ length: frameCount }, (_, i) => ({ key: `${prefix}_${i}` })),
            frameRate,
            repeat
        });
    }


    // =========================================================================
    // 🎬 SCENE 1. StartScene
    // =========================================================================
    class StartScene extends Phaser.Scene {
        constructor() { super({ key: 'StartScene' }); }

        preload() {
            loadSequence(this, 'invit', 0, 20);
            this.load.image('bg_select', 'images/bg_select.png');
            this.load.image('sign', 'images/sign.png');
            this.load.image('title_sign', 'images/title_sign.png');
            this.load.image('title', 'images/title.png');
            this.load.image('sound_on', 'images/sound_on.png');
            this.load.image('sound_off', 'images/sound_off.png');
            this.load.audio('bgm_select', 'audio/bgm_select.mp3');
            this.load.audio('bgm_ch_select', 'audio/bgm_ch_select.mp3');
            this.load.image('bg_wedding_village', 'images/bg_wedding_village.png');
            this.load.audio('bgm_wedding_village', 'audio/bgm_wedding_village.mp3');
            ['man', 'woman', 'toben'].forEach(char => {
                loadSequence(this, `${char}_stand1`, 0, 3);
                loadSequence(this, `${char}_walk1`, 0, 4);
                loadSequence(this, `${char}_jump`, 0, 1);
                this.load.image(`${char}_prone`, `images/${char}_prone.png`);
            });
            loadSequence(this, 'portal', 0, 7);
            loadSequence(this, 'hiden_portal', 1, 5);
            loadSequence(this, 'sprite', 0, 5);
            this.load.audio('bgm_portal', 'audio/bgm_portal.mp3');
            this.load.audio('bgm_tel', 'audio/bgm_tel.mp3');
            this.load.audio('bgm_jump', 'audio/bgm_jump.mp3');
            this.load.image('arrow_0', 'images/arrow_0.png');
        }

        create() {
            createAnim(this, 'invit_playing', 'invit', 21, 12);

            this.add.sprite(640, 360, 'invit_0')
                .setScale(2)
                .play('invit_playing')
                .setInteractive()
                .on('pointerup', () => {
                    try { if (!this.scale.isFullscreen) this.scale.startFullscreen(); } catch (e) {}

                    this.cameras.main.fadeOut(1000, 0, 0, 0);
                    this.cameras.main.once('camerafadeoutcomplete', () => {
                        this.scene.start('SelectScene');
                    });
                });
        }
    }


    // =========================================================================
    // 🎬 SCENE 2. SelectScene
    // =========================================================================
    class SelectScene extends Phaser.Scene {
        constructor() { super({ key: 'SelectScene' }); }

        create() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);

            this.selectedChar = '';
            this.isSoundOn = false;

            this.add.image(640, 360, 'bg_select').setDisplaySize(1280, 720);
            this.add.image(125, 170, 'title_sign').setScale(0.25);
            this.add.image(660, 170, 'title').setScale(0.45);

            createAnim(this, 'portal_playing', 'portal', 8, 5);
            this.add.sprite(300, 500, 'portal_0').setOrigin(0.2, 1).setScale(1.5).play('portal_playing');

            createAnim(this, 'spotlight_playing', 'sprite', 6, 10);
            this.spotlight = this.add.sprite(-200, -200, 'sprite_0').setScale(2).play('spotlight_playing').setVisible(false);

            let soundBtn = this.add.image(1200, 50, 'sound_off').setInteractive({ useHandCursor: true }).setScale(0.1);
            let bgm = this.cache.audio.exists('bgm_select')
                ? this.sound.add('bgm_select', { loop: true, volume: 0.5 })
                : null;

            soundBtn.on('pointerdown', (pointer, localX, localY, event) => {
                if (event) event.stopPropagation();
                if (!bgm) return;

                if (bgm.isPlaying) {
                    bgm.pause();
                    soundBtn.setTexture('sound_off');
                    this.isSoundOn = false;
                } else {
                    bgm.isPaused ? bgm.resume() : bgm.play();
                    soundBtn.setTexture('sound_on');
                    this.isSoundOn = true;
                }
            });

            ['man', 'woman', 'toben'].forEach(char => {
                this.anims.create({
                    key: `${char}_breathing`,
                    frames: [0, 0, 1, 1, 2, 2, 3, 3].map(i => ({ key: `${char}_stand1_${i}` })),
                    frameRate: 6,
                    repeat: -1
                });
                createAnim(this, `${char}_walking`, `${char}_walk1`, 5);
            });

            let manBtn = this.add.sprite(500, 550, 'man_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('man_breathing');
            let womanBtn = this.add.sprite(725, 550, 'woman_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('woman_breathing');
            let tobenBtn = this.add.sprite(950, 550, 'toben_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('toben_breathing');
            const charButtons = [manBtn, womanBtn, tobenBtn];

            const selectCharacter = (targetBtn, charName) => {
                charButtons.forEach(b => {
                    b.setAlpha(0.5).play(`${b.texture.key.split('_')[0]}_breathing`);
                });
                targetBtn.setAlpha(1).play(`${charName}_walking`);
                this.selectedChar = charName;
                this.spotlight.setVisible(true).setPosition(targetBtn.x, targetBtn.y - 250);

                this.sound.stopByKey('bgm_ch_select');
                this.sound.play('bgm_ch_select');
            };

            manBtn.on('pointerdown', () => selectCharacter(manBtn, 'man'));
            womanBtn.on('pointerdown', () => selectCharacter(womanBtn, 'woman'));
            tobenBtn.on('pointerdown', () => selectCharacter(tobenBtn, 'toben'));

            this.add.image(1150, 305, 'sign').setScale(0.3).setInteractive().on('pointerdown', () => {
                if (!this.selectedChar) return;

                this.sound.play('bgm_portal');

                this.cameras.main.fadeOut(1000, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    const goToVillage = () => this.scene.start('VillageScene', {
                        character: this.selectedChar,
                        isSoundOn: this.isSoundOn
                    });

                    if (bgm && bgm.isPlaying) {
                        this.tweens.add({
                            targets: bgm,
                            volume: 0,
                            duration: 500,
                            onComplete: () => { bgm.stop(); goToVillage(); }
                        });
                    } else {
                        goToVillage();
                    }
                });
            });
        }
    }


    // =========================================================================
    // 🎬 SCENE 3. VillageScene
    // =========================================================================
    class VillageScene extends Phaser.Scene {
        constructor() { super({ key: 'VillageScene' }); }

        init(data) {
            this.myChar = data.character;
            this.isSoundOn = data.isSoundOn;
        }

        static FIXED_NPCS = [
            { key: 'bride_fa_sit', x: 1180, y: 755 },
            { key: 'bride_mo_sit', x: 1100, y: 755 },
            { key: 'groom_fa_sit', x: 410, y: 645 },
            { key: 'groom_mo_sit', x: 490, y: 645 },
        ];

        static MOVING_NPCS = [
            { name: 'GM',     prefix: 'GM',            frames: 10, x: 290,  y: 1085, origin: [0.5, 1] },
            { name: 'spinel', prefix: 'spinel',        frames: 12, x: 1450, y: 1085, origin: [0.5, 1] },
            { name: 'warena', prefix: 'warena',        frames: 8,  x: 650,  y: 1085, origin: [0.5, 1] },
            { name: 'groom',  prefix: 'groom_stand1',  frames: 4,  x: 1075, y: 490,  origin: [0.5, 1] },
            { name: 'bride',  prefix: 'bride_stand1',  frames: 4,  x: 1160, y: 490,  origin: [0.5, 1] },
            { name: 'camera', prefix: 'camera',        frames: 4,  x: 850,  y: 1085, origin: [0, 1], flipX: true },
            { name: 'letter', prefix: 'letter',        frames: 6,  x: 2100, y: 780,  origin: [0.5, 1], flipX: true },
        ];

        static SPEECH_SINGLE = [
            { npc: 'spinel',   key: 'text_spinel',   dx: -20, dy: -115 },
            { npc: 'warena',   key: 'text_warena',   dx: 20,  dy: -115 },
            { npc: 'camera',   key: 'text_camera',   dx: 60,  dy: -123 },
            { npc: 'letter',   key: 'text_letter',   dx: 20,  dy: -115 },
        ];
        static SPEECH_SINGLE_FIXED = [
            { npc: 'bride_fa_sit', key: 'text_bride_pa', dx: -50, dy: -100 },
            { npc: 'groom_fa_sit', key: 'text_groom_pa', dx: 50,  dy: -100 },
        ];

        static SPEECH_RELAY = [
            { npc: 'bride', key1: 'text_bride_1', key2: 'text_bride_2', dx: 20,  dy: -115 },
            { npc: 'groom', key1: 'text_groom_1', key2: 'text_groom_2', dx: -20, dy: -115 },
            { npc: 'GM',    key1: 'text_GM_1',    key2: 'text_GM_2',    dx: 20,  dy: -115 },
        ];

        static MAIN_PORTAL = { x: 120, y: 418 };

        static HIDDEN_PORTAL_PAIRS = [
            { a: { x: 645, y: 655, scale: 1.5 },  b: { x: 175, y: 1095, scale: 1.5 } },
            { a: { x: 1270, y: 750, scale: 1.3 }, b: { x: 1815, y: 1095, scale: 1.3 } },
        ];

        static GROUNDS = [
            [3016 / 2, 1245 - 115, 3016, 20],
            [200, 450, 550, 20],
            [235, 540, 60, 20],
            [235, 650, 60, 20],
            [50, 490, 65, 20],
            [50, 600, 65, 20],
            [530, 685, 390, 20],
            [860, 740, 100, 20],
            [1150, 800, 350, 20],
            [1400, 820, 5, 10],
            [1470, 875, 5, 10],
            [2063, 925, 1000, 20],
            [1950, 880, 650, 20],
            [1980, 825, 600, 20],
            [1777.5, 1080, 140, 10],
            [1822.5, 1025, 140, 10],
            [1865, 970, 140, 10],
            [2350, 1053, 870, 10],
            [2398, 1002, 595, 10],
            [995, 690, 3, 10],
            [1060, 660, 3, 10],
            [1100, 610, 3, 10],
            [1175, 580, 3, 10],
            [1240, 565, 3, 10],
            [1300, 535, 3, 10],
            [1330, 475, 3, 10],
            [1335, 420, 3, 10],
            [1325, 365, 3, 10],
            [1290, 315, 3, 10],
            [1220, 285, 3, 10],
            [1145, 300, 3, 10],
            [1065, 305, 3, 10],
            [990, 300, 3, 10],
            [930, 340, 3, 10],
            [915, 395, 3, 10],
            [910, 445, 3, 10],
            [940, 495, 3, 10],
            [990, 540, 3, 10],
            [1055, 575, 3, 10],
            [1110, 530, 100, 20],
        ];

        static JUMP_VELOCITY = { keyboard: -550, touch: -400 };

        static DIRECTION_BUTTONS = [
            { control: 'left',  x: 95,  y: 631, angle: 270 },
            { control: 'right', x: 260, y: 635, angle: 90 },
            { control: 'up',    x: 179, y: 550, angle: 0 },
            { control: 'down',  x: 175, y: 635, angle: 180 },
        ];


        preload() {
            VillageScene.FIXED_NPCS.forEach(npc => this.load.image(npc.key, `images/${npc.key}.png`));
            VillageScene.MOVING_NPCS.forEach(npc => loadSequence(this, npc.prefix, 0, npc.frames - 1));
            VillageScene.SPEECH_SINGLE.forEach(s => this.load.image(s.key, `images/${s.key}.png`));
            VillageScene.SPEECH_SINGLE_FIXED.forEach(s => this.load.image(s.key, `images/${s.key}.png`));
            VillageScene.SPEECH_RELAY.forEach(s => {
                this.load.image(s.key1, `images/${s.key1}.png`);
                this.load.image(s.key2, `images/${s.key2}.png`);
            });
        }

        create() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);

            this.add.image(0, 0, 'bg_wedding_village').setOrigin(0, 0).setScale(0.5);

            const npcRefs = this.createNpcs();
            this.createSpeechBubbles(npcRefs);
            this.createPortals();

            this.physics.world.setBounds(0, 0, 3016, 1245);
            this.cameras.main.setBounds(0, 0, 3016, 1245);

            this.player = this.physics.add.sprite(120, 400, `${this.myChar}_stand1_0`)
                .setScale(1.5).setOrigin(0.5, 1).setCollideWorldBounds(true).setBounce(0).setDepth(10);
            this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

            this.anims.create({ key: `${this.myChar}_jump_up`, frames: [{ key: `${this.myChar}_jump_0` }], frameRate: 1 });
            this.anims.create({ key: `${this.myChar}_jump_peak`, frames: [{ key: `${this.myChar}_jump_1` }], frameRate: 1 });

            this.createGrounds();
            this.setupControls();
            this.setupSoundButton();

            // 코요테 타임용 타임스탬프 초기화
            this.lastGroundedTime = 0;

            this.coordText = this.add.text(0, 0, '(0, 0)', {
                font: '20px Arial',
                fill: '#ffff00',
                backgroundColor: 'rgba(0,0,0,0.7)',
                padding: { x: 5, y: 5 }
            }).setDepth(9999);
        }

        createNpcs() {
            const refs = {};

            VillageScene.FIXED_NPCS.forEach(npc => {
                refs[npc.key] = this.add.image(npc.x, npc.y, npc.key).setOrigin(0.5, 1).setScale(1.5).setDepth(5);
            });

            VillageScene.MOVING_NPCS.forEach(npc => {
                createAnim(this, `anim_${npc.name}`, npc.prefix, npc.frames);
                const origin = npc.origin || [0.5, 1];
                const sprite = this.add.sprite(npc.x, npc.y, `${npc.prefix}_0`)
                    .setOrigin(origin[0], origin[1])
                    .setScale(1.5)
                    .setDepth(5)
                    .play(`anim_${npc.name}`);
                if (npc.flipX) sprite.setFlipX(true);
                refs[npc.name] = sprite;
            });

            return refs;
        }

        createSpeechBubbles(npcRefs) {
            const makeBubble = (npc, key, dx, dy) => this.add.image(npc.x + dx, npc.y + dy, key)
                .setOrigin(0.5, 1).setDepth(12).setVisible(false);

            const allSingle = [...VillageScene.SPEECH_SINGLE, ...VillageScene.SPEECH_SINGLE_FIXED];
            const singleBubbles = allSingle.map(s => makeBubble(npcRefs[s.npc], s.key, s.dx, s.dy));
            const relayBubbles = VillageScene.SPEECH_RELAY.map(s => ({
                b1: makeBubble(npcRefs[s.npc], s.key1, s.dx, s.dy),
                b2: makeBubble(npcRefs[s.npc], s.key2, s.dx, s.dy),
            }));

            [...singleBubbles, ...relayBubbles.flatMap(r => [r.b1, r.b2])].forEach(bubble => {
                if (bubble && bubble.texture) bubble.texture.setFilter(Phaser.Textures.FilterMode.NEAREST);
            });

            singleBubbles.forEach(bubble => {
                this.time.delayedCall(Phaser.Math.Between(0, 3000), () => {
                    const show = () => {
                        bubble.setVisible(true);
                        this.time.delayedCall(2000, () => bubble.setVisible(false));
                    };
                    show();
                    this.time.addEvent({ delay: 4000, loop: true, callback: show });
                });
            });

            relayBubbles.forEach(({ b1, b2 }) => {
                this.time.delayedCall(Phaser.Math.Between(0, 3000), () => {
                    const showRelay = () => {
                        b1.setVisible(true);
                        this.time.delayedCall(2000, () => {
                            b1.setVisible(false);
                            this.time.delayedCall(500, () => {
                                b2.setVisible(true);
                                this.time.delayedCall(2000, () => b2.setVisible(false));
                            });
                        });
                    };
                    showRelay();
                    this.time.addEvent({ delay: 7500, loop: true, callback: showRelay });
                });
            });
        }

        createPortals() {
            this.add.sprite(VillageScene.MAIN_PORTAL.x, VillageScene.MAIN_PORTAL.y, 'portal_0')
                .setOrigin(0.5, 1).setScale(1.5).play('portal_playing');

            createAnim(this, 'hiden_portal_playing', 'hiden_portal', 5);

            VillageScene.HIDDEN_PORTAL_PAIRS.forEach(pair => {
                [pair.a, pair.b].forEach(p => {
                    this.add.sprite(p.x, p.y, 'hiden_portal_0').setOrigin(0.5, 1).setScale(p.scale).play('hiden_portal_playing');
                });
            });
        }

        // ---------------------------------------------------------------
        // 발판 생성
        //  ※ [수정] mainFloorGround는 충돌 콜백으로 isOnMainFloor 플래그를 세움
        //     → performDownJump에서 overlap() 대신 이 플래그를 사용
        // ---------------------------------------------------------------
        createGrounds() {
            this.groundObjects = [];
            this.isOnMainFloor = false; // 맨 아래 바닥 위에 있는지 여부 (충돌 콜백으로 매 프레임 갱신)

            VillageScene.GROUNDS.forEach(([x, y, w, h], index) => {
                const ground = this.add.rectangle(x, y, w, h, 0x00ff00, 0);
                this.physics.add.existing(ground, true);
                ground.body.checkCollision.down = false;
                ground.body.checkCollision.left = false;
                ground.body.checkCollision.right = false;

                if (index === 0) {
                    // 맨 아래 바닥: 충돌 콜백으로 플래그 세팅
                    this.physics.add.collider(this.player, ground, () => {
                        this.isOnMainFloor = true;
                    });
                } else {
                    this.physics.add.collider(this.player, ground);
                }

                this.groundObjects.push(ground);
            });

            this.mainFloorGround = this.groundObjects[0];
            this.dropThroughGrounds = this.groundObjects.slice(1);
        }

        // ---------------------------------------------------------------
        // 조작 UI 세팅
        // ---------------------------------------------------------------
        setupControls() {
            this.cursors = this.input.keyboard.createCursorKeys();
            this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            this.nativeDownKeyHeld = false;
            this._onNativeKeyDown = (e) => { if (e.code === 'ArrowDown') this.nativeDownKeyHeld = true; };
            this._onNativeKeyUp = (e) => { if (e.code === 'ArrowDown') this.nativeDownKeyHeld = false; };
            window.addEventListener('keydown', this._onNativeKeyDown);
            window.addEventListener('keyup', this._onNativeKeyUp);
            this.events.once('shutdown', () => {
                window.removeEventListener('keydown', this._onNativeKeyDown);
                window.removeEventListener('keyup', this._onNativeKeyUp);
            });

            this.game.canvas.setAttribute('tabindex', '0');
            this.game.canvas.focus();

            this.touchControls = { left: false, right: false, up: false, down: false };
            this.isJumping = false;
            this.isDownJumping = false;
            this.isTeleporting = false;

            VillageScene.DIRECTION_BUTTONS.forEach(btn => {
                this.add.image(btn.x, btn.y, 'arrow_0')
                    .setAngle(btn.angle).setScale(1.75).setInteractive().setScrollFactor(0).setDepth(9999)
                    .on('pointerdown', () => this.touchControls[btn.control] = true)
                    .on('pointerup', () => this.touchControls[btn.control] = false)
                    .on('pointerout', () => this.touchControls[btn.control] = false);
            });

            const btnStyle = { font: '30px Arial', fill: '#ffffff', backgroundColor: 'rgba(0,0,0,0.5)', padding: { x: 20, y: 20 } };
            this.add.text(1100, 600, '점프', btnStyle).setInteractive().setScrollFactor(0).setDepth(9999)
                .on('pointerdown', () => this.tryJump(this.readInput().down, VillageScene.JUMP_VELOCITY.touch));
        }

        readInput() {
            return {
                left: this.touchControls.left || this.cursors.left.isDown,
                right: this.touchControls.right || this.cursors.right.isDown,
                up: this.touchControls.up || this.cursors.up.isDown,
                down: this.touchControls.down || this.cursors.down.isDown || this.nativeDownKeyHeld,
                jump: this.spaceKey.isDown,
            };
        }

        setupSoundButton() {
            let bgm = null;
            if (this.cache.audio.exists('bgm_wedding_village')) {
                bgm = this.sound.add('bgm_wedding_village', { loop: true, volume: 0 });
                if (this.isSoundOn) {
                    bgm.play();
                    this.tweens.add({ targets: bgm, volume: 0.5, duration: 1000 });
                }
            }

            const soundBtn = this.add.image(1200, 50, this.isSoundOn ? 'sound_on' : 'sound_off')
                .setInteractive({ useHandCursor: true }).setScale(0.1).setScrollFactor(0).setDepth(9999);

            soundBtn.on('pointerdown', (pointer, localX, localY, event) => {
                if (event) event.stopPropagation();
                if (!bgm) return;

                if (bgm.isPlaying && bgm.volume > 0) {
                    bgm.pause();
                    soundBtn.setTexture('sound_off');
                    this.isSoundOn = false;
                } else {
                    bgm.isPaused ? bgm.resume() : bgm.play();
                    bgm.volume = 0.5;
                    soundBtn.setTexture('sound_on');
                    this.isSoundOn = true;
                }
            });
        }

        // ---------------------------------------------------------------
        // 점프 시도
        //  ※ [수정] 코요테 타임 기준으로 착지 여부를 판단
        //     → body.blocked.down 한두 프레임 흔들림에도 점프 입력이 씹히지 않음
        // ---------------------------------------------------------------
        tryJump(downHeld, jumpVelocity) {
            const COYOTE_MS = 80;
            const canJump = (this.time.now - this.lastGroundedTime) <= COYOTE_MS && !this.isDownJumping;
            if (!canJump) return false;

            if (downHeld) {
                this.performDownJump();
            } else {
                this.player.setVelocityY(jumpVelocity);
                if (!this.isJumping) this.sound.play('bgm_jump');
                this.isJumping = true;
            }
            return true;
        }

        // ---------------------------------------------------------------
        // 아래 점프
        //  ※ [수정] overlap() 대신 isOnMainFloor 플래그로 맨 아래 바닥 여부 판단
        // ---------------------------------------------------------------
        performDownJump() {
            if (this.isOnMainFloor) return; // 맨 아래 바닥에서는 아래 점프 불가

            this.isDownJumping = true;
            this.dropThroughGrounds.forEach(g => g.body.checkCollision.up = false);
            this.player.setVelocityY(150);

            this.time.delayedCall(300, () => {
                this.dropThroughGrounds.forEach(g => g.body.checkCollision.up = true);
                this.isDownJumping = false;
            });
        }

        // ---------------------------------------------------------------
        // 매 프레임 갱신
        //  ※ [수정] airborneFrames 제거 → 코요테 타임(ms) 방식으로 교체
        //     - lastGroundedTime: 마지막으로 바닥에 닿은 시각(ms)
        //     - isOnMainFloor: 충돌 콜백에서 세팅되므로 매 프레임 시작 시 초기화
        // ---------------------------------------------------------------
        update() {
            const pointer = this.input.activePointer;
            this.coordText.setPosition(pointer.worldX + 15, pointer.worldY + 15);
            this.coordText.setText(`(${Math.round(pointer.worldX)}, ${Math.round(pointer.worldY)})`);

            // isOnMainFloor는 충돌 콜백이 이번 프레임에 호출될 때만 true가 되도록
            // 매 프레임 시작 시 초기화 후, 콜백이 다시 세팅하는 방식
            this.isOnMainFloor = false;

            // 코요테 타임: 바닥에 닿아 있는 동안 타임스탬프를 갱신
            if (this.player.body.blocked.down) {
                this.lastGroundedTime = this.time.now;
                this.isJumping = false;
            }

            // ① 입력 읽기
            const input = this.readInput();

            // ② 좌우 이동
            if (input.left) {
                this.player.setVelocityX(-198).setFlipX(false);
            } else if (input.right) {
                this.player.setVelocityX(198).setFlipX(true);
            } else {
                this.player.setVelocityX(0);
            }

            // ③ 점프 (스페이스바)
            if (input.jump) {
                this.tryJump(input.down, VillageScene.JUMP_VELOCITY.keyboard);
            }

            // ④ 포탈 진입 체크
            if (input.up && !this.isTeleporting) {
                this.checkPortalEntry();
            }

            // ⑤ 공중 여부 판정 (코요테 타임 기준)
            //    COYOTE_MS 이내라면 아직 "땅 위"로 취급해 애니메이션도 안정적으로 유지
            const COYOTE_MS = 80;
            const isAirborne = (this.time.now - this.lastGroundedTime) > COYOTE_MS;

            // ⑥ 애니메이션 결정
            if (isAirborne) {
                const anim = Math.abs(this.player.body.velocity.y) < 50 ? 'jump_peak' : 'jump_up';
                this.player.anims.play(`${this.myChar}_${anim}`, true);
            } else if (input.down) {
                this.player.anims.stop();
                this.player.setTexture(`${this.myChar}_prone`);
            } else if (input.left || input.right) {
                this.player.anims.play(`${this.myChar}_walking`, true);
            } else {
                this.player.anims.play(`${this.myChar}_breathing`, true);
            }
        }

        checkPortalEntry() {
            const dist = (x, y) => Phaser.Math.Distance.Between(this.player.x, this.player.y, x, y);
            const PORTAL_RANGE = 50;

            if (dist(VillageScene.MAIN_PORTAL.x, VillageScene.MAIN_PORTAL.y) < PORTAL_RANGE) {
                this.isTeleporting = true;
                this.sound.play('bgm_portal');
                this.cameras.main.fadeOut(1000, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    this.game.sound.stopAll();
                    this.scene.start('SelectScene');
                });
                return;
            }

            for (const pair of VillageScene.HIDDEN_PORTAL_PAIRS) {
                if (dist(pair.a.x, pair.a.y) < PORTAL_RANGE) return this.executeTeleport(pair.b.x, pair.b.y);
                if (dist(pair.b.x, pair.b.y) < PORTAL_RANGE) return this.executeTeleport(pair.a.x, pair.a.y);
            }
        }

        executeTeleport(targetX, targetY) {
            this.isTeleporting = true;
            this.sound.play('bgm_tel');
            this.player.setPosition(targetX, targetY);
            this.time.delayedCall(300, () => { this.isTeleporting = false; });
        }
    }


    // =========================================================================
    // 🧱 렌더러 및 물리 설정
    // =========================================================================
    const config = {
        type: Phaser.AUTO,
        width: 1280,
        height: 720,
        parent: 'game-container',
        render: {
            pixelArt: true,
            roundPixels: true
        },
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 1200 },
                roundPixels: true
            }
        },
        input: {
            activePointers: 3
        },
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [StartScene, SelectScene, VillageScene]
    };
    new Phaser.Game(config);
</script>
</body>
</html>
