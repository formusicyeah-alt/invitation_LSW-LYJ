<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>이승원,이유진 결혼합니다.</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        /* 💡 모바일 브라우저의 100vh는 주소창 영역까지 포함해서 계산되는 경우가 많아,
           세로화면에서 콘텐츠가 화면 정중앙보다 아래로 밀려 보이는 원인이 되곤 합니다.
           지원하는 브라우저에서는 100dvh(주소창 변화에 반응하는 실제 보이는 높이)를 우선 사용합니다. */
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; background-color: #000; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; display: flex; justify-content: center; align-items: center; z-index: 1; }
        #portrait-warning { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #ffffff; color: #000000; display: none; justify-content: center; align-items: center; z-index: 9999; text-align: center; font-family: "Arial", sans-serif; }
        /* 💡 세로화면이어도 무조건 뜨던 기존 미디어쿼리는 제거. 이제부터는 JS가 상황(인트로 전/후)에 맞춰 .active 클래스를 붙여줄 때만 표시됨 */
        #portrait-warning.active { display: flex; }
        
        canvas {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        * {
            cursor: url('images/click_0.png'), auto !important;
        }
    </style>
</head>
<body>
<div id="portrait-warning"><h1>📱<br><br>화면을 가로로 돌려주세요!</h1></div>
<div id="game-container"></div>

<script>
    // =========================================================================
    // 📱 화면 방향 안내 제어
    //  - 인트로(StartScene)에서는 세로화면이어도 안내를 띄우지 않는다.
    //  - 인트로 영상을 탭해서 게임을 "시작"한 순간부터는, 세로화면일 때 회전 안내를 띄운다.
    //  - enforceLandscapeWarning이 핵심 플래그: false면 항상 안내를 숨김, true면 세로일 때만 보임.
    // =========================================================================
    let enforceLandscapeWarning = false;

    function updatePortraitWarning() {
        const isPortrait = window.innerHeight > window.innerWidth;
        const warningEl = document.getElementById('portrait-warning');
        warningEl.classList.toggle('active', enforceLandscapeWarning && isPortrait);
    }

    window.addEventListener('resize', updatePortraitWarning);
    window.addEventListener('orientationchange', updatePortraitWarning);
    updatePortraitWarning(); // 최초 1회 실행 (이 시점엔 enforceLandscapeWarning=false라 항상 숨김 상태)

    // 인트로 탭 시 호출: 가능하면 전체화면 + 가로 고정을 시도하고, 이후부터 회전 안내를 활성화한다.
    //  - 가로 고정(screen.orientation.lock)은 안드로이드 Chrome 등 일부 브라우저에서만 동작하고,
    //    iOS Safari는 지원하지 않는다(실패해도 무시하고 그냥 진행 - 그 경우 사용자가 직접 돌려야 함).
    function enterLandscapeExperience(scaleManager) {
        try {
            if (!scaleManager.isFullscreen) scaleManager.startFullscreen();
        } catch (e) {}

        try {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        } catch (e) {}

        enforceLandscapeWarning = true;
        updatePortraitWarning();
    }

    class StartScene extends Phaser.Scene {
        constructor() { super({ key: 'StartScene' }); }
        preload() {
            for (let i = 0; i <= 20; i++) this.load.image(`invit_${i}`, `images/invit_${i}.png`);
            this.load.image('bg_select', 'images/bg_select.png'); 
            this.load.image('sign', 'images/sign.png'); 
            this.load.image('title_sign', 'images/title_sign.png'); 
            this.load.image('title', 'images/title.png'); 
            
            this.load.image('sound_on', 'images/sound_on.png');
            this.load.image('sound_off', 'images/sound_off.png');
            this.load.audio('bgm_select', 'audio/bgm_select.mp3');

            this.load.image('bg_wedding_village', 'images/bg_wedding_village.png');
            this.load.audio('bgm_wedding_village', 'audio/bgm_wedding_village.mp3');

            const chars = ['man', 'woman', 'toben'];
            chars.forEach(char => {
                for(let z=0; z<=3; z++) this.load.image(`${char}_stand1_${z}`, `images/${char}_stand1_${z}.png`);
                for(let z=0; z<=4; z++) this.load.image(`${char}_walk1_${z}`, `images/${char}_walk1_${z}.png`);
                for(let z=0; z<=1; z++) this.load.image(`${char}_jump_${z}`, `images/${char}_jump_${z}.png`);
                this.load.image(`${char}_prone`, `images/${char}_prone.png`);
            });
            for (let i = 0; i <= 7; i++) this.load.image(`portal_${i}`, `images/portal_${i}.png`);
            for (let i = 1; i <= 5; i++) this.load.image(`hiden_portal_${i}`, `images/hiden_portal_${i}.png`);
            for (let i = 0; i <= 5; i++) this.load.image(`sprite_${i}`, `images/sprite_${i}.png`);

            this.load.audio('bgm_portal', 'audio/bgm_portal.mp3');
            this.load.audio('bgm_tel', 'audio/bgm_tel.mp3');
            this.load.audio('bgm_jump', 'audio/bgm_jump.mp3');
            this.load.image('arrow_0', 'images/arrow_0.png');
            this.load.image('jump_key', 'images/jump_key.png');
            this.load.image('npc_key', 'images/npc_key.png');
            
            this.load.audio('bgm_ch_select', 'audio/bgm_ch_select.mp3');
        }
        create() {
            this.anims.create({ key: 'invit_playing', frames: Array.from({length:21}, (_,i)=>({key:`invit_${i}`})), frameRate: 12, repeat: -1 });

            // =========================================================================
            // 📐 인트로(invit_$) 이미지의 위치(x, y)와 크기(scale)를 가로/세로 화면별로 따로 지정합니다.
            //  - x, y는 게임 내부 좌표 기준 (가로 1280 x 세로 720 이라고 생각하면 됩니다)
            //    · x: 0(맨 왼쪽) ~ 1280(맨 오른쪽), 640이 정중앙
            //    · y: 0(맨 위) ~ 720(맨 아래), 360이 정중앙
            //  - scale은 원본 이미지 크기의 배수입니다 (2 = 2배, 4 = 4배 ...)
            //  - 나중에 위치/크기를 조절하고 싶으면 아래 숫자만 바꾸면 됩니다!
            // =========================================================================
            const isPortrait = window.innerHeight > window.innerWidth;

            const invitLayout = isPortrait
                ? { x: 640, y: 200, scale: 4 } // 📱 세로화면(스마트폰): 사용자 확정값 (x:640, y:200), 기존보다 2배 크게(2→4)
                : { x: 640, y: 360, scale: 2 }; // 💻 가로화면(컴퓨터 등): 기존 그대로 유지

            this.add.sprite(invitLayout.x, invitLayout.y, 'invit_0').setScale(invitLayout.scale).play('invit_playing').setInteractive().on('pointerup', () => {
                enterLandscapeExperience(this.scale); // 전체화면 + 가로 고정 시도 + 이후 회전 안내 활성화

                this.cameras.main.fadeOut(1000, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    this.scene.start('SelectScene');
                });
            });
        }
    }

    class SelectScene extends Phaser.Scene {
        constructor() { super({ key: 'SelectScene' }); }

        create() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);

            this.selectedChar = ""; 
            this.isSoundOn = false; 
            
            this.add.image(640, 360, 'bg_select').setDisplaySize(1280, 720);
            this.add.image(125, 170, 'title_sign').setScale(0.25);
            
            this.anims.create({ key: 'portal_playing', frames: Array.from({length: 8}, (_, i) => ({ key: `portal_${i}` })), frameRate: 5, repeat: -1 });
            this.add.sprite(300, 500, 'portal_0').setOrigin(0.2, 1).setScale(1.5).play('portal_playing');

            this.anims.create({ key: 'spotlight_playing', frames: Array.from({length: 6}, (_, i) => ({ key: `sprite_${i}` })), frameRate: 10, repeat: -1 });
            this.spotlight = this.add.sprite(-200, -200, 'sprite_0').setScale(2).play('spotlight_playing').setVisible(false);

            this.add.image(660, 170, 'title').setScale(0.45);

            let soundBtn = this.add.image(1200, 50, 'sound_off').setInteractive({ useHandCursor: true }).setScale(0.1);
            let bgm = null;
            if (this.cache.audio.exists('bgm_select')) {
                bgm = this.sound.add('bgm_select', { loop: true, volume: 0.5 });
            }
            soundBtn.on('pointerdown', (pointer, localX, localY, event) => {
                if (event) event.stopPropagation();
                if (!bgm) return; 
                if (bgm.isPlaying) {
                    bgm.pause(); 
                    soundBtn.setTexture('sound_off'); 
                    this.isSoundOn = false;
                } else {
                    if (bgm.isPaused) { bgm.resume(); } else { bgm.play(); }
                    soundBtn.setTexture('sound_on'); 
                    this.isSoundOn = true;
                }
            });

            const chars = ['man', 'woman', 'toben'];
            chars.forEach(char => {
                this.anims.create({ key: `${char}_breathing`, frames: [ { key: `${char}_stand1_0` }, { key: `${char}_stand1_0` }, { key: `${char}_stand1_1` }, { key: `${char}_stand1_1` }, { key: `${char}_stand1_2` }, { key: `${char}_stand1_2` }, { key: `${char}_stand1_3` }, { key: `${char}_stand1_3` } ], frameRate: 6, repeat: -1 });
                this.anims.create({ key: `${char}_walking`, frames: [ { key: `${char}_walk1_0` }, { key: `${char}_walk1_1` }, { key: `${char}_walk1_2` }, { key: `${char}_walk1_3` }, { key: `${char}_walk1_4` } ], frameRate: 6, repeat: -1 });
            });
            let manBtn = this.add.sprite(500, 510, 'man_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('man_breathing');
            let womanBtn = this.add.sprite(725, 510, 'woman_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('woman_breathing');
            let tobenBtn = this.add.sprite(950, 510, 'toben_stand1_0').setOrigin(0.5, 1).setInteractive().setScale(2).play('toben_breathing');
            
            const selectCharacter = (targetBtn, charName) => {
                [manBtn, womanBtn, tobenBtn].forEach(b => { b.setAlpha(0.5); b.play(b.texture.key.split('_')[0] + '_breathing'); });
                targetBtn.setAlpha(1).play(`${charName}_walking`);
                this.selectedChar = charName; 
                this.spotlight.setVisible(true).setPosition(targetBtn.x, targetBtn.y - 250);
                
                this.sound.stopByKey('bgm_ch_select');
                this.sound.play('bgm_ch_select'); 
            };
            manBtn.on('pointerdown', () => selectCharacter(manBtn, 'man'));
            womanBtn.on('pointerdown', () => selectCharacter(womanBtn, 'woman'));
            tobenBtn.on('pointerdown', () => selectCharacter(tobenBtn, 'toben'));
            
            this.add.image(1150, 305, 'sign').setScale(0.3).setInteractive().on('pointerdown', () => { 
                if(this.selectedChar) {
                    this.sound.play('bgm_portal');

                    this.cameras.main.fadeOut(1000, 0, 0, 0);
                    this.cameras.main.once('camerafadeoutcomplete', () => {
                        if (bgm && bgm.isPlaying) {
                            this.tweens.add({
                                targets: bgm,
                                volume: 0,
                                duration: 500,
                                onComplete: () => {
                                    bgm.stop();
                                    this.scene.start('VillageScene', { character: this.selectedChar, isSoundOn: this.isSoundOn }); 
                                }
                            });
                        } else {
                            this.scene.start('VillageScene', { character: this.selectedChar, isSoundOn: this.isSoundOn }); 
                        }
                    });
                }
            });
        }
    }

    class VillageScene extends Phaser.Scene {
        constructor() { super({ key: 'VillageScene' }); }
        init(data) { 
            this.myChar = data.character; 
            this.isSoundOn = data.isSoundOn;
        }

        preload() {
            this.load.image('bride_fa_sit', 'images/bride_fa_sit.png');
            this.load.image('bride_mo_sit', 'images/bride_mo_sit.png');
            this.load.image('groom_fa_sit', 'images/groom_fa_sit.png');
            this.load.image('groom_mo_sit', 'images/groom_mo_sit.png');

            for (let i = 0; i <= 9; i++) this.load.image(`GM_${i}`, `images/GM_${i}.png`);
            for (let i = 0; i <= 11; i++) this.load.image(`spinel_${i}`, `images/spinel_${i}.png`);
            for (let i = 0; i <= 7; i++) this.load.image(`warena_${i}`, `images/warena_${i}.png`);
            
            for (let i = 0; i <= 3; i++) this.load.image(`groom_stand1_${i}`, `images/groom_stand1_${i}.png`);
            for (let i = 0; i <= 3; i++) this.load.image(`bride_stand1_${i}`, `images/bride_stand1_${i}.png`);
            
            for (let i = 0; i <= 3; i++) this.load.image(`camera_${i}`, `images/camera_${i}.png`);
            for (let i = 0; i <= 5; i++) this.load.image(`letter_${i}`, `images/letter_${i}.png`);

            this.load.image('text_spinel', 'images/text_spinel.png');
            this.load.image('text_warena', 'images/text_warena.png');
            this.load.image('text_bride_pa', 'images/text_bride_pa.png');
            this.load.image('text_groom_pa', 'images/text_groom_pa.png');
            this.load.image('text_camera', 'images/text_camera.png');
            this.load.image('text_letter', 'images/text_letter.png');

            this.load.image('text_bride_1', 'images/text_bride_1.png');
            this.load.image('text_bride_2', 'images/text_bride_2.png');
            this.load.image('text_groom_1', 'images/text_groom_1.png');
            this.load.image('text_groom_2', 'images/text_groom_2.png');
            this.load.image('text_GM_1', 'images/text_GM_1.png');
            this.load.image('text_GM_2', 'images/text_GM_2.png');

            // 💬 NPC 대화창 관련 이미지
            //  - 대화창은 NPC마다 다른 이미지를 쓰므로, NPC를 추가할 때마다 여기에 load 한 줄씩 추가하면 됩니다.
            //    예) this.load.image('chat_page_bride_fa', 'images/chat_page_bride_fa.png');
            this.load.image('chat_page_groom_fa', 'images/chat_page_groom_fa.png'); // 신랑 아버지 NPC의 대화창 이미지
            this.load.image('chat_page_bride', 'images/chat_page_bride.png'); // 신부 NPC의 대화창 이미지
            this.load.image('chat_page_warena', 'images/chat_page_warena.png'); // 워레나(축의금 계좌번호 안내) NPC의 대화창 이미지
            this.load.image('chat_page_spinel', 'images/chat_page_spinel.png'); // 스피넬(예식장 위치 안내) NPC의 대화창 이미지
            this.load.image('check_exit', 'images/check_exit.png'); // 대화창 닫기(X) 버튼 이미지 (모든 NPC 공용)

            // 👑 운영자(GM) NPC 대화창 이미지 - 메인 메뉴 1장 + 메뉴 선택 시 보여줄 하위 페이지 5장
            this.load.image('chat_page_GM', 'images/chat_page_GM.png');     // GM 대화 시작 시 보이는 메인 메뉴 이미지
            this.load.image('chat_page_GM_1', 'images/chat_page_GM_1.png'); // 1. 신랑, 신부, 혼주
            this.load.image('chat_page_GM_2', 'images/chat_page_GM_2.png'); // 2. 축의 정보
            this.load.image('chat_page_GM_3', 'images/chat_page_GM_3.png'); // 3. 결혼식장 위치
            this.load.image('chat_page_GM_4', 'images/chat_page_GM_4.png'); // 4. 웨딩 촬영 사진
            this.load.image('chat_page_GM_5', 'images/chat_page_GM_5.png'); // 5. 우체통
        }

        create() {
            this.cameras.main.fadeIn(1000, 0, 0, 0);

            this.add.image(0, 0, 'bg_wedding_village').setOrigin(0, 0).setScale(0.5);

            this.anims.create({ key: 'anim_GM', frames: Array.from({length: 10}, (_, i) => ({ key: `GM_${i}` })), frameRate: 6, repeat: -1 });
            this.anims.create({ key: 'anim_spinel', frames: Array.from({length: 12}, (_, i) => ({ key: `spinel_${i}` })), frameRate: 6, repeat: -1 });
            this.anims.create({ key: 'anim_warena', frames: Array.from({length: 8}, (_, i) => ({ key: `warena_${i}` })), frameRate: 6, repeat: -1 });
            
            this.anims.create({ key: 'anim_groom', frames: Array.from({length: 4}, (_, i) => ({ key: `groom_stand1_${i}` })), frameRate: 6, repeat: -1 });
            this.anims.create({ key: 'anim_bride', frames: Array.from({length: 4}, (_, i) => ({ key: `bride_stand1_${i}` })), frameRate: 6, repeat: -1 });
            
            this.anims.create({ key: 'anim_camera', frames: Array.from({length: 4}, (_, i) => ({ key: `camera_${i}` })), frameRate: 6, repeat: -1 });
            this.anims.create({ key: 'anim_letter', frames: Array.from({length: 6}, (_, i) => ({ key: `letter_${i}` })), frameRate: 6, repeat: -1 });

            let npc_bride_fa = this.add.image(1180, 755, 'bride_fa_sit').setOrigin(0.5, 1).setScale(1.5).setDepth(5); 
            let npc_bride_mo = this.add.image(1100, 755, 'bride_mo_sit').setOrigin(0.5, 1).setScale(1.5).setDepth(5); 
            let npc_groom_fa = this.add.image(410, 645, 'groom_fa_sit').setOrigin(0.5, 1).setScale(1.5).setDepth(5); 
            let npc_groom_mo = this.add.image(490, 645, 'groom_mo_sit').setOrigin(0.5, 1).setScale(1.5).setDepth(5); 

            let npc_GM = this.add.sprite(290, 1085, 'GM_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).play('anim_GM'); 
            let npc_spinel = this.add.sprite(1450, 1085, 'spinel_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).play('anim_spinel'); 
            let npc_warena = this.add.sprite(650, 1085, 'warena_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).play('anim_warena'); 
            
            let npc_groom = this.add.sprite(1075, 490, 'groom_stand1_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).play('anim_groom');
            let npc_bride = this.add.sprite(1160, 490, 'bride_stand1_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).play('anim_bride');
            
            let npc_camera = this.add.sprite(850, 1085, 'camera_0').setOrigin(0, 1).setScale(1.5).setDepth(5).setFlipX(true).play('anim_camera'); 
            let npc_letter = this.add.sprite(2100, 780, 'letter_0').setOrigin(0.5, 1).setScale(1.5).setDepth(5).setFlipX(true).play('anim_letter'); 

            let bubble_spinel = this.add.image(npc_spinel.x - 20, npc_spinel.y - 115, 'text_spinel').setOrigin(0.5, 1).setDepth(12).setVisible(false);
            let bubble_warena = this.add.image(npc_warena.x + 20, npc_warena.y - 115, 'text_warena').setOrigin(0.5, 1).setDepth(12).setVisible(false);
            let bubble_bride_pa = this.add.image(npc_bride_fa.x - 50, npc_bride_fa.y - 100, 'text_bride_pa').setOrigin(0.5, 1).setDepth(12).setVisible(false);
            let bubble_groom_pa = this.add.image(npc_groom_fa.x + 50, npc_groom_fa.y - 100, 'text_groom_pa').setOrigin(0.5, 1).setDepth(12).setVisible(false);
            let bubble_camera = this.add.image(npc_camera.x + 60, npc_camera.y - 123, 'text_camera').setOrigin(0.5, 1).setDepth(12).setVisible(false);
            let bubble_letter = this.add.image(npc_letter.x + 20, npc_letter.y - 115, 'text_letter').setOrigin(0.5, 1).setDepth(12).setVisible(false);

            let bubble_bride_1 = this.add.image(npc_bride.x + 20, npc_bride.y - 115, 'text_bride_1').setOrigin(0.5, 1).setDepth(12).setVisible(false);
            let bubble_bride_2 = this.add.image(npc_bride.x + 20, npc_bride.y - 115, 'text_bride_2').setOrigin(0.5, 1).setDepth(12).setVisible(false);

            let bubble_groom_1 = this.add.image(npc_groom.x - 20, npc_groom.y - 115, 'text_groom_1').setOrigin(0.5, 1).setDepth(12).setVisible(false);

            this.chatNpcs = [
                { npc: npc_groom_fa, chatImageKey: 'chat_page_groom_fa' },
                { npc: npc_bride, chatImageKey: 'chat_page_bride' },
                { npc: npc_warena, chatImageKey: 'chat_page_warena', buildExtras: () => this.buildWarenaAccounts() },
                { npc: npc_spinel, chatImageKey: 'chat_page_spinel', buildExtras: () => this.buildSpinelMapLink() },
                { npc: npc_GM, chatImageKey: 'chat_page_GM', buildExtras: () => this.buildGMMenu() },
            ];

            // NPC 상하좌우 기준 80 이내에 플레이어가 있는지 확인 (원형 거리가 아니라 x/y축 각각 비교)
            const NPC_INTERACT_RANGE = 80;
            const isNearNpc = (npc) => {
                return Math.abs(this.player.x - npc.x) <= NPC_INTERACT_RANGE &&
                       Math.abs(this.player.y - npc.y) <= NPC_INTERACT_RANGE;
            };

            // 대화창(팝업) 이미지 + 닫기(X) 버튼은 미리 1세트만 만들어두고, 대화할 때마다
            // 텍스처(이미지)만 바꿔 끼워서 재사용한다 (NPC마다 새로 만들지 않음)
            const CHAT_POPUP_SCALE = 0.4; // 모든 NPC 대화창에 공통으로 적용될 크기 배수 - 여기 숫자만 바꾸면 전체 반영됨
            
            this.chatPopupImage = this.add.image(640, 360, 'chat_page_groom_fa')
                .setScale(CHAT_POPUP_SCALE)
                .setOrigin(0.5, 0.5)    // 중심 기준으로 정렬해야 "화면 정중앙"에 놓기 편함
                .setScrollFactor(0)      // 카메라(맵)가 움직여도 화면에 고정되도록
                .setDepth(20000)     // 다른 모든 요소(UI 포함)보다 위에 보이도록 최상단 depth
                .setVisible(false);

            this.chatExitButton = this.add.image(0, 0, 'check_exit')
                .setOrigin(0.7, 0)         // 오른쪽-위 모서리를 기준점으로 → "대화창의 가장 오른쪽 위"에 놓기 쉬워짐
                .setScrollFactor(0)
                .setDepth(20001)         // 대화창 이미지보다 한 단계 더 위 (가려지지 않도록)
                .setInteractive({ useHandCursor: true })
                .setScale(1.5)      // 크기 조절
                .setVisible(false);

            // 닫기(X) 버튼을 누르면 대화창 닫기 (메뉴든 하위 페이지든 어디서 누르든 전체 대화가 종료됨)
            this.chatExitButton.on('pointerdown', () => this.closeChat());

            // 현재 열려있는 대화의 "추가 요소"들(계좌번호 텍스트, 메뉴 텍스트, 지도 링크 등)을 보관해두는 배열
            // → 페이지가 바뀌거나 대화가 끝날 때 이 배열에 든 것들을 전부 제거(destroy)한다.
            this.chatExtraObjects = [];

            // =================================================================
            // 🔄 대화창 "페이지 전환" 공용 함수
            //  - imageKey: 새로 보여줄 대화창 이미지
            //  - newExtras: 그 페이지에 올라갈 추가 요소들(텍스트 등). 없으면 빈 배열 []
            //  - 기존에 떠있던 추가 요소(이전 페이지의 메뉴 텍스트 등)는 자동으로 정리(destroy)된다.
            //  - GM처럼 "메뉴 선택 → 다른 이미지로 전환"하는 NPC는 메뉴 텍스트의 클릭 핸들러 안에서
            //    이 함수를 호출하면 된다 (위 buildGMMenu 참고).
            // =================================================================
            this.setChatPage = (imageKey, newExtras = []) => {
                // 이전 페이지에 있던 추가 요소들을 전부 제거
                this.chatExtraObjects.forEach(obj => obj.destroy());

                this.chatPopupImage.setTexture(imageKey).setPosition(640, 360).setVisible(true);

                // 닫기 버튼을 "대화창 이미지의 가장 오른쪽 위"로 자동 배치 (이미지가 바뀌어도 항상 재계산)
                const popupRightEdge = this.chatPopupImage.x + this.chatPopupImage.displayWidth / 2;
                const popupTopEdge = this.chatPopupImage.y - this.chatPopupImage.displayHeight / 2;
                this.chatExitButton.setPosition(popupRightEdge, popupTopEdge).setVisible(true);

                this.chatExtraObjects = newExtras;
            };

            // NPC와의 대화창을 연다 (entry: this.chatNpcs 배열의 항목 하나)
            this.openChat = (entry) => {
                this.isChatOpen = true; // 대화 중에는 캐릭터 이동/점프를 막는다 (update()에서 이 플래그를 체크함)

                this.setChatPage(entry.chatImageKey, entry.buildExtras ? entry.buildExtras() : []);

                this.player.setVelocityX(0); // 대화 시작 시 캐릭터를 제자리에 멈춰 세움
            };

            // 대화창을 닫고 원래 웨딩빌리지 화면으로 되돌린다
            this.closeChat = () => {
                this.isChatOpen = false;
                this.chatPopupImage.setVisible(false);
                this.chatExitButton.setVisible(false);

                // 떠있던 추가 요소(계좌번호 텍스트, 메뉴 텍스트 등)들을 전부 제거
                this.chatExtraObjects.forEach(obj => obj.destroy());
                this.chatExtraObjects = [];
            };

            // "근처에 있는 NPC" 중 한 명과의 대화를 시도한다 (NPC버튼을 눌렀을 때 호출)
            this.tryOpenNearestChat = () => {
                if (this.isChatOpen) return; // 이미 대화 중이면 무시
                const target = this.chatNpcs.find(entry => isNearNpc(entry.npc));
                if (target) this.openChat(target);
            };

            // NPC를 직접 클릭(터치)했을 때도 대화가 열리도록 만들어주는 함수.
            // 단, 멀리서 클릭하면 무시되고 "가까이 있을 때만" 열린다.
            const makeNpcClickable = (npc) => {
                npc.setInteractive({ useHandCursor: true });
                npc.on('pointerdown', () => {
                    if (this.isChatOpen) return;
                    const entry = this.chatNpcs.find(e => e.npc === npc);
                    if (entry && isNearNpc(npc)) this.openChat(entry);
                });
            };

            // 클릭으로도 대화 가능하게 설정 (대화 가능한 NPC를 늘릴 때마다 한 줄씩 추가)
            makeNpcClickable(npc_groom_fa);
            makeNpcClickable(npc_bride);
            makeNpcClickable(npc_warena);
            makeNpcClickable(npc_spinel);
            makeNpcClickable(npc_GM);

            this.coordText = this.add.text(0, 0, '(0, 0)', {
                font: '30px Arial',
                fill: '#ffff00', 
                backgroundColor: 'rgba(0,0,0,0.7)', 
                padding: { x: 5, y: 5 }
            }).setDepth(9999);
        }

        update() {
            let pointer = this.input.activePointer;
            this.coordText.setPosition(pointer.worldX + 15, pointer.worldY + 15);
            this.coordText.setText(`(${Math.round(pointer.worldX)}, ${Math.round(pointer.worldY)})`);

            // 💬 대화창이 열려있는 동안은 캐릭터 이동/점프를 전부 멈춘다 (대화에만 집중)
            if (this.isChatOpen) {
                Phaser.Input.Keyboard.JustDown(this.spaceKey); // 대화 중 눌린 점프 입력은 버려서, 대화 종료 직후 점프가 튀어나가지 않게 함
                this.player.setVelocityX(0);
                return;
            }

            let moveLeft = this.controls.left || this.cursors.left.isDown;
            let moveRight = this.controls.right || this.cursors.right.isDown;
            let moveUp = this.controls.up || this.cursors.up.isDown;
            let moveDown = this.controls.down || this.cursors.down.isDown;
            let jumpPressed = Phaser.Input.Keyboard.JustDown(this.spaceKey) || this.controls.jumpJustPressed;
            
            this.controls.jumpJustPressed = false;

            // 💡 코요테 타임 (0.1초의 여유) 적용: 물리 엔진 떨림 무시
            if (this.player.body.blocked.down) {
                this.isJumping = false;
                this.lastGroundedTime = this.time.now;
            }

            // 바닥에 닿은 지 100ms(0.1초) 이내이고 점프 중이 아니라면 바닥에 있는 것으로 인정
            let isGrounded = (this.time.now - this.lastGroundedTime) <= 100 && !this.isJumping;

            if (!isGrounded) {
                this.currentGround = null; // 완전히 공중에 떠있을 때만 바닥 초기화
            }

            if (this.isPreparingDownJump) {
                this.player.setVelocityX(0);
                this.player.anims.play(`${this.myChar}_prone_anim`, true);
                return;
            }

            if (moveLeft && !moveDown) { 
                this.player.setVelocityX(-198).setFlipX(false); 
            } else if (moveRight && !moveDown) { 
                this.player.setVelocityX(198).setFlipX(true); 
            } else { 
                this.player.setVelocityX(0); 
            }

            // 💡 물리엔진 변수 대신 새로 만든 여유 변수(isGrounded)로 점프 가능 판별
            if (jumpPressed && isGrounded) {
                if (moveDown) {
                    // 아래키와 점프키가 동시에 눌렸을 때만 아래로 통과
                    if (this.currentGround && this.currentGround !== this.mainFloorGround) {
                        this.isPreparingDownJump = true;
                        this.player.setVelocityX(0);
                        this.player.anims.play(`${this.myChar}_prone_anim`, true);
                        this.time.delayedCall(500, () => {
                            this.isPreparingDownJump = false;
                            let target = this.currentGround;
                            if (target) target.body.checkCollision.up = false;
                            this.player.setVelocityY(150);
                            this.time.delayedCall(400, () => { if (target) target.body.checkCollision.up = true; });
                        });
                    }
                } else {
                    // 일반 점프
                    this.player.setVelocityY(-550); // 중력 900에 최적화된 점프값
                    this.sound.play('bgm_jump');
                    this.isJumping = true;
                    this.lastGroundedTime = 0;
                }
            }

            if (moveUp && !this.isTeleporting) {
                if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 120, 418) < 50) {
                    this.isTeleporting = true;
                    this.sound.play('bgm_portal'); 
                    this.cameras.main.fadeOut(1000, 0, 0, 0);
                    this.cameras.main.once('camerafadeoutcomplete', () => {
                        this.game.sound.stopAll(); 
                        this.scene.start('SelectScene');
                    });
                }
                else if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 645, 655) < 50) {
                    this.executeTeleport(175, 1095);
                }
                else if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 175, 1095) < 50) {
                    this.executeTeleport(645, 655);
                }
                else if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 1270, 750) < 50) {
                    this.executeTeleport(1815, 1095);
                }
                else if (Phaser.Math.Distance.Between(this.player.x, this.player.y, 1815, 1095) < 50) {
                    this.executeTeleport(1270, 750);
                }
            }

            // 💡 애니메이션 출력도 isGrounded 변수를 기반으로 판별
            if (!isGrounded) {
                if (Math.abs(this.player.body.velocity.y) < 50) { 
                    this.player.anims.play(`${this.myChar}_jump_peak`, true); 
                } else { 
                    this.player.anims.play(`${this.myChar}_jump_up`, true); 
                }
            } else {
                if (moveDown) {
                    this.player.anims.play(`${this.myChar}_prone_anim`, true);
                } else if (moveLeft || moveRight) { 
                    this.player.anims.play(`${this.myChar}_walking`, true); 
                } else { 
                    this.player.anims.play(`${this.myChar}_breathing`, true); 
                }
            }
        }

        executeTeleport(targetX, targetY) {
            this.isTeleporting = true; 
            this.sound.play('bgm_tel'); 
            
            this.player.setVelocityY(0); 
            this.player.setPosition(targetX, targetY - 10); 
            
            this.time.delayedCall(300, () => { this.isTeleporting = false; });
        }
    }

    const config = { 
        type: Phaser.AUTO, 
        width: 1280, 
        height: 720, 
        parent: 'game-container', 
        render: { 
            pixelArt: true,
            roundPixels: true 
        },
        physics: { 
            default: 'arcade', 
            arcade: { 
                gravity: { y: 1200 }
                // 💡 roundPixels: true 옵션을 제거하여 1픽셀 오차 진동 현상 방지
            } 
        }, 
        input: {
            activePointers: 3 
        },
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, 
        scene: [StartScene, SelectScene, VillageScene] 
    };
    new Phaser.Game(config);
</script>
</body>
</html>
